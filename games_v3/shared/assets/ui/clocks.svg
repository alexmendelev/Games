<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Clocks</title>
  <desc id="desc">A colorful game card showing analog clocks and a digital time display.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="52%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="900" height="900" rx="90" fill="url(#bg)"/>
  <circle cx="760" cy="130" r="92" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="150" cy="180" r="64" fill="#ffffff" fill-opacity="0.14"/>
  <circle cx="120" cy="760" r="80" fill="#ffffff" fill-opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="138" y="120" width="624" height="220" rx="48" fill="url(#tablet)"/>
    <rect x="176" y="158" width="548" height="144" rx="28" fill="#e0f2fe"/>
    <text x="450" y="255" text-anchor="middle" font-size="122" font-weight="900" font-family="Verdana, Arial, sans-serif" fill="#0f172a">3:15</text>
  </g>

  <g transform="translate(0 26)">
    <g transform="translate(215 470)">
      <circle r="122" fill="#f8fafc" stroke="#1e293b" stroke-width="14"/>
      <circle r="10" fill="#1e293b"/>
      <g stroke="#1e293b" stroke-linecap="round">
        <line x1="0" y1="-84" x2="0" y2="-28" stroke-width="12"/>
        <line x1="84" y1="0" x2="28" y2="0" stroke-width="12"/>
        <line x1="0" y1="84" x2="0" y2="28" stroke-width="12"/>
        <line x1="-84" y1="0" x2="-28" y2="0" stroke-width="12"/>
      </g>
      <line x1="0" y1="0" x2="44" y2="-44" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="-74" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    </g>

    <g transform="translate(450 470)">
      <circle r="122" fill="#f8fafc" stroke="#1e293b" stroke-width="14"/>
      <circle r="10" fill="#1e293b"/>
      <g stroke="#1e293b" stroke-linecap="round">
        <line x1="0" y1="-84" x2="0" y2="-28" stroke-width="12"/>
        <line x1="84" y1="0" x2="28" y2="0" stroke-width="12"/>
        <line x1="0" y1="84" x2="0" y2="28" stroke-width="12"/>
        <line x1="-84" y1="0" x2="-28" y2="0" stroke-width="12"/>
      </g>
      <line x1="0" y1="0" x2="54" y2="-12" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="-74" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    </g>

    <g transform="translate(685 470)">
      <circle r="122" fill="#f8fafc" stroke="#1e293b" stroke-width="14"/>
      <circle r="10" fill="#1e293b"/>
      <g stroke="#1e293b" stroke-linecap="round">
        <line x1="0" y1="-84" x2="0" y2="-28" stroke-width="12"/>
        <line x1="84" y1="0" x2="28" y2="0" stroke-width="12"/>
        <line x1="0" y1="84" x2="0" y2="28" stroke-width="12"/>
        <line x1="-84" y1="0" x2="-28" y2="0" stroke-width="12"/>
      </g>
      <line x1="0" y1="0" x2="-12" y2="-56" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="52" y2="-52" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <g font-family="Verdana, Arial, sans-serif" font-size="74" font-weight="900" fill="#ffffff" text-anchor="middle">
    <text x="450" y="804">CLOCKS</text>
  </g>
</svg>
