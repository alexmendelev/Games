<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>תרגילים נופלים</title>
  <link rel="preload" href="assets/splash.mp3" as="audio" type="audio/mpeg">
  <link rel="preload" href="assets/coin_drop.mp3" as="audio" type="audio/mpeg">
  <style>
    :root{ --ui:1; --text:#fff; --muted:rgba(255,255,255,.85); }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:#06101f; color:var(--text);
      font-family: Arial, "Noto Sans Hebrew","Rubik","Heebo",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      overflow:hidden;
    }
    .wrap{ height:100dvh; padding:14px; display:flex; gap:14px;  direction:ltr; }
    .game{
      position:relative; flex:1; min-width:280px; overflow:hidden; border-radius:16px;
      background:#1a2a46 url("assets/bg.png") center/cover no-repeat;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .side{ width:min(calc(340px * var(--ui)), 45vw); display:flex; flex-direction:column; gap:12px;  direction:rtl; }
    .panel{
      background: rgba(10,18,40,.55);
      border:1px solid rgba(255,255,255,.16);
      border-radius:16px;
      padding: calc(12px * var(--ui));
      backdrop-filter: blur(6px);
    }
    .answersPanel{ margin-top: 20%; }
    .panel.bottom{ margin-top: auto; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .panel.bottom .row{ justify-content:center; flex-wrap:nowrap; }
    .panel.bottom .actions{ display:flex; gap:8px; flex:0 0 auto; }
.panel.bottom .ctrl{ height: calc(64px * var(--ui)); padding: 0 calc(10px * var(--ui)); font-size: calc(16px * var(--ui)); }
    .stat{ color:var(--muted); font-size: calc(20px * var(--ui)); }
    .stat b{ color:var(--text); font-size: calc(34px * var(--ui)); margin-inline-start:8px; font-weight:900; }
    .answers{ display:grid; grid-template-columns:1fr 1fr; gap: calc(12px * var(--ui)); }
    .ans{
      height: calc(110px * var(--ui));
      font-size: calc(53px * var(--ui));
      font-weight: 900;
      border-radius: calc(22px * var(--ui));
      border: 2px solid rgba(33,53,95,.48);
      color:#1b1b1b;
      text-shadow:0 1px 0 rgba(255,255,255,.3);
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.94), rgba(255,255,255,.88) 46%, rgba(237,244,255,.80) 100%);
      cursor:pointer;
      direction:ltr; unicode-bidi:bidi-override;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.92),
        0 8px 16px rgba(0,0,0,.14);
      position: relative;
      overflow: hidden;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      padding: 0;
      text-align: center;
    }
    .ans:hover{
      border-color: rgba(44,74,130,.72);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 10px 18px rgba(0,0,0,.17);
    }
    .ans:active,
    .ans.is-pressed{
      transform: translateY(calc(4px * var(--ui))) scale(.97);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.82),
        0 3px 8px rgba(0,0,0,.18);
    }
    .ans::after{
      content: "";
      position:absolute;
      right: calc(10px * var(--ui));
      top: 50%;
      width: calc(40px * var(--ui));
      height: calc(40px * var(--ui));
      line-height: 1;
      opacity:0;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
      transform: translateY(-50%) scale(.6);
      transition: opacity .12s ease, transform .12s ease;
      pointer-events:none;
    }
    .ans.mark-correct::after{
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%2316a34a'/><path d='M18 33l9 9 19-19' fill='none' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      opacity:1;
      transform: translateY(-50%) scale(1);
    }
    .ans.mark-correct{
      border-color: rgba(22,163,74,.95);
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.96), rgba(196,248,218,.98) 42%, rgba(96,226,151,.96) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 12px 22px rgba(22,163,74,.42);
    }
    .ans.mark-wrong::after{
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%23dc2626'/><path d='M21 21l22 22M43 21L21 43' fill='none' stroke='white' stroke-width='8' stroke-linecap='round'/></svg>");
      opacity:1;
      transform: translateY(-50%) scale(1);
    }
    .ans.mark-wrong{
      border-color: rgba(220,38,38,.94);
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.96), rgba(255,214,214,.98) 42%, rgba(247,124,124,.96) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 12px 22px rgba(220,38,38,.40);
    }

    .ctrl{
      height: calc(54px * var(--ui));
      padding: 0 calc(16px * var(--ui));
      font-size: calc(20px * var(--ui));
      font-weight: 800;
      border-radius: calc(14px * var(--ui));
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .ctrl:active{ transform: translateY(1px); }
    .ctrl.iconBtn{
      width: calc(141px * var(--ui));
      min-width: calc(141px * var(--ui));
      padding: 0;
      background-color: rgba(255,255,255,.10);
      background-position: center;
      background-repeat: no-repeat;
      background-size: 70% 70%;
    }
    #pauseBtn{ background-image: url("assets/pause.png"); }
    #pauseBtn.paused{ background-image: url("assets/resume.png"); }
    #exitBtn{ background-image: url("assets/exit.png"); }


    .tile{
      position:absolute; left:0; top:0;
      width: calc(240px * var(--ui));
      height: calc(78px * var(--ui));
      background: url("assets/tablet.png") center/contain no-repeat;
      background-size:100% 100%;
      display:grid; place-items:center;
      font-size: calc(42px * var(--ui));
      font-weight: 900;
      color:#1b1b1b;
      text-shadow:0 2px 0 rgba(255,255,255,.25), 0 10px 22px rgba(0,0,0,.20);
      user-select:none;
      pointer-events:none;
      direction:ltr; unicode-bidi:bidi-override;
      z-index:10;
      transform: translate(20px, -120px);
    }

    .mascot{
      position:absolute;
      left:10%;
      bottom:14px;
      width: min(calc(260px * var(--ui)), 34vw);
      height:auto;
      pointer-events:none;
      z-index:110;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,.40));
    }

    /* top stats (score / coin / lives) */
    .topStats{ justify-content: space-between; align-items:center; width:100%; gap: calc(8px * var(--ui)); flex-wrap: nowrap; }
    .topStats .block{ display:flex; flex-direction:column; align-items:center; gap:4px; }
    .topStats img.icon{ width: calc(92px * var(--ui)); height: auto; display:block; }
    .topStats .stat b{ margin-inline-start:4px; }
    .scoreBlock{ flex:0 0 auto; align-items:center !important; }
    .pointsPanel{
      min-height: calc(60px * var(--ui));
      width: calc(128px * var(--ui));
      min-width: calc(128px * var(--ui));
      max-width: calc(128px * var(--ui));
      padding: 0 calc(11px * var(--ui));
      display:flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: calc(14px * var(--ui));
      background: rgba(255,255,255,.08);
    }
    .pointsPanel b{
      font-size: calc(34px * var(--ui)) !important;
      line-height: 1;
      letter-spacing: .5px;
      font-variant-numeric: tabular-nums;
    }
    .vitalStats{ display:flex; gap: calc(2px * var(--ui)); flex-wrap:nowrap; }
    @keyframes lifeSpendPulse{
      0%{ transform: scale(1); }
      38%{ transform: scale(.8); }
      100%{ transform: scale(1); }
    }
    #livesIcon.life-hit{
      animation: lifeSpendPulse 280ms cubic-bezier(.22,.61,.36,1);
    }

    /* quick pulse for score and coin feedback */
    @keyframes scorePulse{ 0%{ transform:scale(1); color:var(--text);} 50%{ transform:scale(1.12); color:#ffd54f;} 100%{ transform:scale(1); color:var(--text);} }
    #score.pulse, #coins.pulse{ animation: scorePulse 320ms ease; }

    .overlay{
      position:absolute; inset:0;
      display:grid; place-items:center;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(2px);
      z-index:200;
    }
    .card{
      width: min(520px, 92%);
      background: rgba(10,18,40,.70);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: calc(16px * var(--ui));
    }
    .card h2{ margin:0 0 12px; font-size: calc(30px * var(--ui)); font-weight:900; }
    .diffs{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .diffbtn{
      appearance:none;
      border: 2px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.12);
      color: var(--text);
      border-radius: 18px;
      cursor:pointer;
      font-weight: 900;
      font-size: clamp(28px, 4.2vw, 64px);
      padding: clamp(18px, 3.2vw, 44px) clamp(14px, 2.8vw, 36px);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
    }
    .diffbtn:active{ transform: scale(0.98); }
    .diffbtn:hover{ background: rgba(255,255,255,.14); }

    .fx{
      position:absolute; pointer-events:none;
      background-repeat:no-repeat;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
      z-index:8;
    }
    .fx.burstFx{
      mix-blend-mode: screen;
      filter:
        saturate(1.35)
        brightness(1.20)
        drop-shadow(0 0 14px rgba(255,220,120,.80))
        drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }
    .burstFlash{
      position:absolute;
      left:0;
      top:0;
      width: calc(300px * var(--ui));
      aspect-ratio: 1 / 1;
      pointer-events:none;
      z-index:22;
      border-radius:50%;
      mix-blend-mode: screen;
      opacity:0;
      background:
        radial-gradient(circle,
          rgba(255,255,255,.98) 0%,
          rgba(255,244,160,.92) 18%,
          rgba(255,120,200,.55) 42%,
          rgba(110,190,255,.30) 58%,
          rgba(110,190,255,0) 78%);
      transform: translate(-50%, -50%) scale(.25);
      animation: burstFlashPop 760ms cubic-bezier(.22,.61,.36,1) forwards;
    }
    @keyframes burstFlashPop{
      0%{ opacity:0; transform: translate(-50%, -50%) scale(.25); }
      18%{ opacity:1; }
      100%{ opacity:0; transform: translate(-50%, -50%) scale(1.55); }
    }
    .fireworkCore{
      position:absolute;
      left:0;
      top:0;
      width: calc(210px * var(--ui));
      aspect-ratio:1/1;
      pointer-events:none;
      border-radius:50%;
      z-index:26;
      mix-blend-mode: screen;
      background: radial-gradient(circle,
        rgba(255,255,255,.98) 0%,
        rgba(255,250,210,.95) 14%,
        rgba(255,206,86,.78) 30%,
        rgba(255,206,86,0) 72%);
      transform: translate(-50%, -50%) scale(.22);
      opacity:0;
    }
    .fireworkRing{
      position:absolute;
      left:0;
      top:0;
      width: calc(50px * var(--ui));
      aspect-ratio:1/1;
      pointer-events:none;
      border-radius:50%;
      border: calc(5px * var(--ui)) solid rgba(255,245,180,.95);
      z-index:25;
      mix-blend-mode: screen;
      transform: translate(-50%, -50%) scale(.22);
      opacity:0;
    }
    .fireworkSpark{
      position:absolute;
      left:0;
      top:0;
      pointer-events:none;
      border-radius:50%;
      z-index:27;
      mix-blend-mode: screen;
      transform: translate(-50%, -50%) scale(.25);
      opacity:0;
      will-change: transform, opacity, filter;
    }
    .hitFlash{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:120;
      mix-blend-mode: screen;
      opacity:0;
      background: radial-gradient(circle at 50% 45%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 70%);
      animation: hitFlashPulse 680ms cubic-bezier(.2,.62,.22,1) forwards;
    }
    @keyframes hitFlashPulse{
      0%{ opacity:0; }
      10%{ opacity:1; }
      100%{ opacity:0; }
    }
    .coinFly{
      position: fixed;
      left: 0;
      top: 0;
      width: clamp(34px, 5.2vw, 56px);
      height: auto;
      pointer-events: none;
      z-index: 320;
      will-change: transform, opacity;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }

    @media (max-width: 820px){
      .panel.bottom .actions{ gap:6px; }
      .panel.bottom .ctrl{ height: calc(56px * var(--ui)); padding: 0 calc(8px * var(--ui)); font-size: calc(14px * var(--ui)); }
      .wrap{ flex-direction:column; }
      .game{ flex: 0 0 52dvh; min-height: 52dvh; }
      .side{ width:100%; flex:1 1 auto; min-height:0; overflow:hidden; }
      .answersPanel{ margin-top: 1%; }
      .panel.bottom{ margin-top: 10px; }
      .side{ gap:8px; }
      .mascot{ width: min(calc(220px * var(--ui)), 32vw); left:6%; }
    }
    @media (max-height: 880px){
      .answersPanel{ margin-top: 0; }
      .panel.bottom{ margin-top: 6px; }
      .side{ gap:6px; }
      .answers{ gap: calc(8px * var(--ui)); }
      .ans{ height: calc(96px * var(--ui)); font-size: calc(44px * var(--ui)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="game" class="game">
      <img id="mascot" class="mascot" src="assets/cat_idle.png" alt="">
      <div id="tile" class="tile">1+3</div>

      <div id="overlay" class="overlay">
        <div class="menu">
          <div class="diffs" id="diffs">
            <button class="diffbtn" data-diff="easy">קל</button>
            <button class="diffbtn" data-diff="medium">בינוני</button>
            <button class="diffbtn" data-diff="hard">קשה</button>
            <button class="diffbtn" data-diff="mul10">כפל 1-10</button>
            <button class="diffbtn" data-diff="super">סופר</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side">
      <div class="panel">
        <div class="row topStats">
          <div class="block scoreBlock">
            <div class="stat scoreOnly pointsPanel"><b id="score">0</b></div>
          </div>
          <div class="vitalStats">
            <div class="block">
              <img id="coinIcon" src="assets/star.svg" alt="" class="icon">
              <div class="stat"><b id="coins">0</b></div>
            </div>
            <div class="block">
              <img id="livesIcon" src="assets/heart.svg" alt="" class="icon">
              <div class="stat"><b id="lives">10</b></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel answersPanel">
        <div class="answers" id="answers">
          <button class="ans" data-idx="0">0</button>
          <button class="ans" data-idx="1">0</button>
          <button class="ans" data-idx="2">0</button>
          <button class="ans" data-idx="3">0</button>
        </div>
      </div>

      <div class="panel bottom">
        <div class="row">
          <div class="actions">
            <button id="pauseBtn" class="ctrl iconBtn" type="button" aria-label="השהיה"></button>
            <button id="exitBtn" class="ctrl iconBtn" type="button" aria-label="יציאה"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const WATER_Y_RATIO = 0.80;
  // Splash drawn lower than waterline.
  // Use sublinear scaling so it does not drift too much on very large / small screens.
  // Baseline: 150px at 650px height; exponent 0.5 (sqrt).
  const SPLASH_OFFSET_BASE_PX = 150;
  const SPLASH_OFFSET_BASELINE_H = 650;
  const SPLASH_OFFSET_EXP = 0.5;


  const ASSETS = {
    splashSheet: { url: "assets/splash_sheet.png", sheetW: 1024, sheetH: 1024, cols: 4, rows: 4, frames: 16, fps: 30, scale: 0.75 },
    burstSheet:  { url: "assets/burst_sheet.png",  sheetW: 1024, sheetH: 1024, cols: 4, rows: 4, frames: 16, fps: 30, scale: 0.65 },
    mascotIdle:  "assets/cat_idle.png",
    mascotHappy: "assets/cat_happy.png?v=2",
    mascotShame: "assets/cat_shame.png"
  };

  const DIFFS = {
    easy:   { label:"קל",     speedMul:0.55, correct:+10, allowNegResult:false, noNegOptions:true,  ops:["+", "-"] },
    medium: { label:"בינוני", speedMul:1.00, correct:+15, allowNegResult:false, noNegOptions:true,  ops:["+", "-"] },
    hard:   { label:"קשה",    speedMul:1.20, correct:+20, allowNegResult:true,  noNegOptions:false, ops:["+", "-"] },
    mul10:  { label:"כפל 1-10", speedMul:1.10, correct:+20, allowNegResult:false, noNegOptions:true, ops:["*"] },
    super:  { label:"סופר",   speedMul:1.50, correct:+25, allowNegResult:true,  noNegOptions:false, ops:["+", "-", "*", "/"] },
  };

  const CONFIG = {
    livesStart: 10,
    scoreWrong: -5,
    scoreMiss:  -10,
    baseSpeed:  80,      // px/s baseline (scaled by device height and difficulty)
    speedIncPerLevel: 6,
    pointsPerLevel: 200,
    tileWBase: 240,
    tileHBase: 78,
    marginBase: 10,
    sfxGain: 0.10
  };
  const ANSWER_FEEDBACK_MS = 220;

  const gameEl = document.getElementById("game");
  const tileEl = document.getElementById("tile");
  const overlayEl = document.getElementById("overlay");
  const diffsEl = document.getElementById("diffs");
  const pauseBtn = document.getElementById("pauseBtn");
  const exitBtn = document.getElementById("exitBtn");
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const livesIconEl = document.getElementById("livesIcon");
  const coinEl = document.getElementById("coins");
  const coinIconEl = document.getElementById("coinIcon");
  if(livesIconEl) livesIconEl.src = "assets/heart.svg?v=20260307";

  const ansBtns = Array.from(document.querySelectorAll(".ans"));
  const mascotEl = document.getElementById("mascot");

  const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
  const randInt = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const randFloat = (a,b)=>Math.random()*(b-a)+a;
  const choice = (arr)=>arr[Math.floor(Math.random()*arr.length)];

  function fmtNum(n){
    // keep LTR and show real minus sign
    return n < 0 ? "\u200E\u2212" + Math.abs(n) : "\u200E" + n;
  }

  // ===== UI scale =====
  function computeUi(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const s = Math.min(vw/900, vh/650);
    const portrait = vh > vw;
    return clamp(s * (portrait ? 0.92 : 1.0), 0.58, 1.0);
  }
  function applyUi(){
    const ui = computeUi();
    document.documentElement.style.setProperty("--ui", ui.toFixed(3));
  }
  window.addEventListener("resize", applyUi);
  window.addEventListener("orientationchange", applyUi);
  applyUi();

  // ===== audio (simple + splash mp3) =====
  let audioCtx=null, masterGain=null, audioUnlocked=false;
  const splashPool = Array.from({length:6}, ()=> {
    const a = new Audio("assets/splash.mp3");
    a.preload="auto";
    a.volume=0.9;
    a.load();
    return a;
  });
  const coinDropPool = Array.from({length:4}, ()=> {
    const a = new Audio("assets/coin_drop.mp3");
    a.preload="auto";
    a.volume=0.9;
    a.load();
    return a;
  });
  let splashI=0;
  let coinDropI=0;

  function ensureAudio(){
    try{
      if(!audioCtx){
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = CONFIG.sfxGain;
        masterGain.connect(audioCtx.destination);
      }
      if(audioCtx.state==="suspended") audioCtx.resume();
    }catch(_){}

    if(audioUnlocked) return;
    audioUnlocked = true;
    const a = splashPool[0];
    try{
      a.muted = true;
      const p = a.play();
      if(p && p.then){
        p.then(()=>{ a.pause(); a.currentTime=0; a.muted=false; }).catch(()=>{ a.muted=false; });
      }else{
        a.pause(); a.currentTime=0; a.muted=false;
      }
    }catch(_){ a.muted=false; }
  }
  window.addEventListener("pointerdown", ensureAudio, { once:true });

  function beep({freq=440, dur=0.12, type="sine", gain=1.0, when=0, rampTo=null}){
    if(!audioCtx || !masterGain) return;
    const t0 = audioCtx.currentTime + when;
    const t1 = t0 + Math.max(0.01, dur);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if(rampTo && rampTo>0) osc.frequency.exponentialRampToValueAtTime(rampTo, t1);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t1);
    osc.connect(g); g.connect(masterGain);
    osc.start(t0); osc.stop(t1 + 0.02);
  }
  function playCorrectChime(){
    if(!audioCtx || !masterGain) return;
    // Magical bell-like chord with airy overtones and a shimmer tail.
    const notes = [1046.5, 1318.5, 1568.0]; // C6, E6, G6
    for(let i=0; i<notes.length; i++){
      const f = notes[i];
      const t = i * 0.07;
      const mainGain = 0.56 - i * 0.08;
      beep({ freq:f, dur:0.34 + i*0.03, type:"sine", gain:mainGain, when:t, rampTo:f*1.02 });
      beep({ freq:f*2, dur:0.46 + i*0.03, type:"triangle", gain:0.18, when:t + 0.012, rampTo:f*1.94 });
    }
    beep({ freq:2093, dur:0.24, type:"sine", gain:0.18, when:0.18, rampTo:2489 });
    beep({ freq:2637, dur:0.30, type:"sine", gain:0.13, when:0.24, rampTo:3136 });
    // Long soft resonance.
    beep({ freq:783.99, dur:0.62, type:"sine", gain:0.11, when:0.20, rampTo:740 });
  }
  function playSplash(){
    const a = splashPool[splashI++ % splashPool.length];
    try{ a.currentTime = 0; }catch(_){}
    a.play().catch(()=>{ audioUnlocked=false; ensureAudio(); });
  }
  function playCoinDrop(){
    const a = coinDropPool[coinDropI++ % coinDropPool.length];
    try{ a.currentTime = 0; }catch(_){}
    a.play().catch(()=>{});
  }
  const sfx = {
    correct(){ ensureAudio(); playCorrectChime(); },
    wrong(){ ensureAudio(); beep({freq:240, dur:0.10, type:"sine", gain:0.9, rampTo:180}); },
    splash(){ ensureAudio(); playSplash(); },
    coin(){ ensureAudio(); playCoinDrop(); },
    death(){ ensureAudio(); beep({freq:420, rampTo:110, dur:0.75, type:"sawtooth", gain:1.0}); }
  };

  // ===== sprite FX =====
  function playSheetFx(sheetCfg, x, y, anchor, opts = {}){
    const cfg = sheetCfg;
    const {
      className = "",
      scaleMul = 1,
      fpsMul = 1,
      filter = "",
      zIndex = null
    } = opts;
    const frameW = cfg.sheetW / cfg.cols;
    const frameH = cfg.sheetH / cfg.rows;
    const scale = cfg.scale * scaleMul;

    const el = document.createElement("div");
    el.className = "fx";
    if(className){
      className.split(/\s+/).filter(Boolean).forEach(cls => el.classList.add(cls));
    }
    el.style.left = x + "px";
    el.style.top  = y + "px";
    el.style.width  = (frameW * scale) + "px";
    el.style.height = (frameH * scale) + "px";
    el.style.backgroundImage = `url("${cfg.url}")`;
    el.style.backgroundSize  = (cfg.sheetW * scale) + "px " + (cfg.sheetH * scale) + "px";
    if(filter) el.style.filter = filter;
    if(zIndex !== null) el.style.zIndex = String(zIndex);
    el.style.transform = anchor === "bottom" ? "translate(-50%, -100%)" : "translate(-50%, -50%)";
    gameEl.appendChild(el);

    let f = 0;
    const dt = 1 / Math.max(1, cfg.fps * fpsMul);
    let acc = 0;
    let last = performance.now();

    function step(ts){
      const d = (ts - last) / 1000; last = ts;
      acc += d;
      while(acc >= dt){
        acc -= dt;
        const col = f % cfg.cols;
        const row = Math.floor(f / cfg.cols);
        el.style.backgroundPosition = (-col * frameW * scale) + "px " + (-row * frameH * scale) + "px";
        f++;
        if(f >= cfg.frames){
          el.remove();
          return;
        }
      }
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function playBurstFlash(x, y, hueDeg = 0){
    const el = document.createElement("div");
    el.className = "burstFlash";
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.filter = `hue-rotate(${hueDeg}deg) saturate(2.35) brightness(1.26)`;
    el.addEventListener("animationend", () => el.remove(), { once: true });
    gameEl.appendChild(el);
  }

  function playHitScreenFlash(baseHue = randInt(0, 359)){
    const el = document.createElement("div");
    el.className = "hitFlash";
    const h1 = baseHue;
    const h2 = (baseHue + 120) % 360;
    const h3 = (baseHue + 240) % 360;
    el.style.background = `
      radial-gradient(circle at 50% 44%, hsla(${h1}, 100%, 66%, .66) 0%, hsla(${h2}, 100%, 62%, .36) 38%, hsla(${h3}, 100%, 56%, 0) 74%),
      radial-gradient(circle at 54% 48%, hsla(${h2}, 100%, 64%, .42) 0%, hsla(${h3}, 100%, 58%, .28) 44%, hsla(${h1}, 100%, 60%, 0) 78%)
    `;
    el.addEventListener("animationend", () => el.remove(), { once: true });
    gameEl.appendChild(el);
  }

  function playFireworks(x, y, baseHue = randInt(0, 359)){
    const ui = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--ui")) || 1;
    const colors = ["#ffd93d", "#ff65d9", "#59c8ff", "#7dff8f", "#ff9e57", "#b783ff"];

    const core = document.createElement("div");
    core.className = "fireworkCore";
    core.style.left = x + "px";
    core.style.top = y + "px";
    core.style.background = `radial-gradient(circle,
      hsla(${baseHue}, 100%, 88%, .95) 0%,
      hsla(${(baseHue + 36) % 360}, 100%, 70%, .88) 18%,
      hsla(${(baseHue + 95) % 360}, 100%, 62%, .62) 36%,
      hsla(${(baseHue + 140) % 360}, 100%, 58%, 0) 74%)`;
    core.style.filter = "saturate(2.35) brightness(1.26)";
    gameEl.appendChild(core);
    core.animate(
      [
        { opacity: 0, transform: "translate(-50%, -50%) scale(.22)" },
        { opacity: 1, transform: "translate(-50%, -50%) scale(.95)", offset: 0.22 },
        { opacity: 0, transform: "translate(-50%, -50%) scale(1.75)" }
      ],
      { duration: 980, easing: "cubic-bezier(.2,.68,.2,1)" }
    ).finished.finally(() => core.remove());

    for(let r=0; r<2; r++){
      const ring = document.createElement("div");
      ring.className = "fireworkRing";
      ring.style.left = x + "px";
      ring.style.top = y + "px";
      const hue = (baseHue + (r === 0 ? 20 : 190)) % 360;
      const ringColor = `hsla(${hue}, 100%, 74%, .95)`;
      ring.style.borderColor = ringColor;
      ring.style.filter = `saturate(2.35) brightness(1.28) drop-shadow(0 0 18px ${ringColor})`;
      gameEl.appendChild(ring);
      ring.animate(
        [
          { opacity: 0, transform: "translate(-50%, -50%) scale(.24)" },
          { opacity: 0.95, transform: "translate(-50%, -50%) scale(1.15)", offset: 0.2 },
          { opacity: 0, transform: "translate(-50%, -50%) scale(3.1)" }
        ],
        { duration: 1080 + r * 180, easing: "cubic-bezier(.14,.64,.18,1)" }
      ).finished.finally(() => ring.remove());
    }

    const sparkCount = 42;
    for(let i=0; i<sparkCount; i++){
      const spark = document.createElement("div");
      spark.className = "fireworkSpark";
      const color = colors[i % colors.length];
      const size = randFloat(7, 16) * ui;
      spark.style.width = size + "px";
      spark.style.height = size + "px";
      spark.style.left = x + "px";
      spark.style.top = y + "px";
      spark.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,255,.98), ${color} 52%, rgba(0,0,0,0) 76%)`;
      spark.style.boxShadow = `0 0 ${10*ui}px ${color}, 0 0 ${22*ui}px ${color}`;
      spark.style.filter = `hue-rotate(${baseHue}deg) saturate(2.15) brightness(1.14)`;
      gameEl.appendChild(spark);

      const angle = (Math.PI * 2 * i / sparkCount) + randFloat(-0.12, 0.12);
      const dist = randFloat(84, 220) * ui;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const duration = randInt(900, 1500);
      const hueShift = randInt(-28, 28);

      spark.animate(
        [
          { opacity: 1, transform: "translate(-50%, -50%) scale(.35)", filter: `hue-rotate(${hueShift}deg)` },
          { opacity: 0.95, transform: `translate(calc(-50% + ${dx*0.35}px), calc(-50% + ${dy*0.35}px)) scale(1)`, offset: 0.22, filter: `hue-rotate(${hueShift+10}deg)` },
          { opacity: 0, transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(.45)`, filter: `hue-rotate(${hueShift+22}deg) blur(1px)` }
        ],
        { duration, easing: "cubic-bezier(.08,.64,.22,1)" }
      ).finished.finally(() => spark.remove());
    }
  }

  function playEnhancedBurst(x, y){
    const baseHue = randInt(0, 359);
    playHitScreenFlash(baseHue);
    playBurstFlash(x, y, baseHue);
    setTimeout(() => playBurstFlash(x, y, (baseHue + 150) % 360), 86);
    setTimeout(() => playBurstFlash(x, y, (baseHue + 285) % 360), 180);
    setTimeout(() => playFireworks(x, y, baseHue), 56);

    // Keep a textured sprite layer under the fireworks.
    playSheetFx(ASSETS.burstSheet, x, y, "center", {
      className: "burstFx",
      scaleMul: 1.35,
      fpsMul: 0.52,
      filter: `hue-rotate(${(baseHue + 25) % 360}deg) saturate(2.55) brightness(1.36) drop-shadow(0 0 26px hsla(${baseHue}, 100%, 72%, .92))`,
      zIndex: 24
    });
  }

  function popCoinIcon(){
    if(!coinIconEl || !coinIconEl.animate) return Promise.resolve();
    const anim = coinIconEl.animate(
      [
        { transform: "scale(1)", filter: "drop-shadow(0 0 0 rgba(255,215,64,0))" },
        { transform: "scale(1.34)", filter: "drop-shadow(0 0 10px rgba(255,215,64,.9))" },
        { transform: "scale(1)", filter: "drop-shadow(0 0 0 rgba(255,215,64,0))" }
      ],
      { duration: 330, easing: "cubic-bezier(.22,.61,.36,1)" }
    );
    return anim.finished.catch(() => {});
  }

  function animateCoinToHud(startXInGame, startYInGame){
    if(!coinIconEl || !coinIconEl.getBoundingClientRect){
      return Promise.resolve();
    }
    const gameR = gameEl.getBoundingClientRect();
    const coinR = coinIconEl.getBoundingClientRect();
    const startX = gameR.left + startXInGame;
    const startY = gameR.top + startYInGame;
    const endX = coinR.left + coinR.width / 2;
    const endY = coinR.top + coinR.height / 2;
    const ctrlX = (startX + endX) / 2;
    const ctrlY = Math.min(startY, endY) - 120;

    const flyEl = document.createElement("img");
    flyEl.className = "coinFly";
    flyEl.src = coinIconEl.currentSrc || coinIconEl.src;
    flyEl.alt = "";
    document.body.appendChild(flyEl);

    const frames = [
      { transform: `translate(${startX}px, ${startY}px) translate(-50%, -50%) scale(.35)`, opacity: 0.0, offset: 0 },
      { transform: `translate(${startX}px, ${startY - 8}px) translate(-50%, -50%) scale(.95)`, opacity: 1.0, offset: 0.14 },
      { transform: `translate(${ctrlX}px, ${ctrlY}px) translate(-50%, -50%) scale(1.05)`, opacity: 1.0, offset: 0.72 },
      { transform: `translate(${endX}px, ${endY}px) translate(-50%, -50%) scale(.62)`, opacity: 1.0, offset: 1 }
    ];

    const anim = flyEl.animate(frames, { duration: 2480, easing: "cubic-bezier(.17,.67,.27,1)" });
    return anim.finished.catch(() => {}).then(() => { flyEl.remove(); });
  }

  function awardCoinFromBurst(startXInGame, startYInGame){
    animateCoinToHud(startXInGame, startYInGame)
      .then(() => { sfx.coin(); return popCoinIcon(); })
      .finally(() => {
        coins += 1;
        setHUD();
        coinEl.classList.add("pulse");
        setTimeout(() => coinEl.classList.remove("pulse"), 450);
      });
  }

  // ===== game state =====
  let selected = null;
  let running = false;
  let paused = false;
  let rafId = null;
  let lastTs = 0;

  let score = 0;
  let lives = CONFIG.livesStart;

  let coins = 0;
  let consecutiveCorrect = 0;

  let tileX = 20;
  let tileY = -120;
  let prevCorrectIdx = -1;

  let task = null; // { text, answer }

  function rect(){ return gameEl.getBoundingClientRect(); }
  function waterY(r){ return r.height * WATER_Y_RATIO; }

  function level(){
    return Math.max(1, Math.floor(score / CONFIG.pointsPerLevel) + 1);
  }

  function speedPxPerSec(){
    const base = CONFIG.baseSpeed + (level() - 1) * CONFIG.speedIncPerLevel;
    const r = rect();
    const h = r && r.height ? r.height : 650;
    const heightMul = Math.max(0.72, Math.min(1.15, h / 650));
    return base * DIFFS[selected].speedMul * heightMul;
  }

  function setHUD(){
    scoreEl.textContent = String(score);
    livesEl.textContent = String(lives);
    coinEl.textContent = String(coins);
  }
  function animateLifeSpent(){
    if(!livesIconEl) return;
    livesIconEl.classList.remove("life-hit");
    void livesIconEl.offsetWidth;
    livesIconEl.classList.add("life-hit");
  }

  function clearAnswerMarks(){
    ansBtns.forEach((btn) => {
      if(btn._markTimer){
        clearTimeout(btn._markTimer);
        btn._markTimer = null;
      }
      if(btn._pressTimer){
        clearTimeout(btn._pressTimer);
        btn._pressTimer = null;
      }
      btn.classList.remove("mark-correct", "mark-wrong", "is-pressed");
    });
  }

  function showAnswerMark(btn, isCorrect, duration = ANSWER_FEEDBACK_MS){
    if(!btn) return;
    if(btn._markTimer){
      clearTimeout(btn._markTimer);
      btn._markTimer = null;
    }
    if(btn._pressTimer){
      clearTimeout(btn._pressTimer);
      btn._pressTimer = null;
    }
    btn.classList.add("is-pressed");
    btn._pressTimer = setTimeout(() => {
      btn.classList.remove("is-pressed");
      btn._pressTimer = null;
    }, 140);
    btn.classList.remove("mark-correct", "mark-wrong");
    btn.classList.add(isCorrect ? "mark-correct" : "mark-wrong");
    btn._markTimer = setTimeout(() => {
      btn.classList.remove("mark-correct", "mark-wrong");
      btn._markTimer = null;
    }, duration);
  }

  function setMascot(state){
    if(state==="happy") mascotEl.src = ASSETS.mascotHappy;
    else if(state==="shame") mascotEl.src = ASSETS.mascotShame;
    else mascotEl.src = ASSETS.mascotIdle;
  }

  function randomTileX(){
    const r = rect();
    const ui = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--ui")) || 1;
    const tileW = CONFIG.tileWBase * ui;
    const m = CONFIG.marginBase * ui;
    const maxX = Math.max(m, r.width - tileW - m);
    return randInt(Math.round(m), Math.round(maxX));
  }

  function makeTask(){
    const cfg = DIFFS[selected];
    const op = choice(cfg.ops);

    let a,b,ans,text;

    if(op === "+"){
      a = randInt(0, 10);
      b = randInt(0, 10);
      ans = a + b;
      text = `${a}+${b}`;
    } else if(op === "-"){
      a = randInt(0, 10);
      b = randInt(0, 10);
      if(!cfg.allowNegResult){
        if(b > a){ const t=a; a=b; b=t; }
      }
      ans = a - b;
      text = `${a}-${b}`;
    } else if(op === "*"){
      const mulMin = selected === "mul10" ? 1 : 0;
      a = randInt(mulMin, 10);
      b = randInt(mulMin, 10);
      ans = a * b;
      text = `${a}×${b}`;
    } else { // "/"
      b = randInt(1, 10);
      ans = randInt(0, 10);
      a = ans * b;
      text = `${a}÷${b}`;
    }

    return { op, a, b, answer: ans, text };
  }

  function uniqueWrongs(correct){
    const cfg = DIFFS[selected];
    const set = new Set([correct]);

    function ok(n){
      if(cfg.noNegOptions && n < 0) return false;
      return true;
    }

    let guard = 0;
    while(set.size < 4 && guard++ < 200){
      // generate wrong near correct
      const delta = randInt(-6, 6) || 1;
      let w = correct + delta;

      // sometimes jump more
      if(Math.random() < 0.25) w = correct + randInt(-15, 15);

      // avoid duplicates and invalid
      if(!ok(w)) continue;
      set.add(w);
    }

    // fallback if stuck
    while(set.size < 4){
      const w = Math.max(0, correct + set.size);
      if(ok(w)) set.add(w);
      else set.add(correct + set.size);
    }

    const arr = Array.from(set);
    // shuffle
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    // ensure correct not same spot as previous
    let idx = arr.indexOf(correct);
    if(idx === prevCorrectIdx){
      const swapWith = (idx + 1) % 4;
      [arr[idx], arr[swapWith]] = [arr[swapWith], arr[idx]];
      idx = swapWith;
    }
    prevCorrectIdx = idx;
    return { arr, correctIdx: idx };
  }

  function renderTask(){
    task = makeTask();
    tileEl.textContent = task.text;
    clearAnswerMarks();

    const { arr } = uniqueWrongs(task.answer);
    for(let i=0;i<4;i++){
      ansBtns[i].textContent = fmtNum(arr[i]);
      ansBtns[i].dataset.val = String(arr[i]);
    }

    tileX = randomTileX();
    tileY = -140;
    tileEl.style.transform = `translate(${tileX}px, ${tileY}px)`;
  }

  function miss(){
    const r = rect();
    const splashX = tileX;
    score += CONFIG.scoreMiss;
    lives -= 1;
    animateLifeSpent();
    consecutiveCorrect = 0;
    setHUD();

    const ui = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--ui")) || 1;
    const tileCenterX = splashX + (CONFIG.tileWBase * ui)/2;
    setMascot("shame");
    setTimeout(()=> setMascot("idle"), 500);

    if(lives <= 0){
      running = false;
      sfx.splash();
      playSheetFx(ASSETS.splashSheet, tileCenterX, waterY(r) + (SPLASH_OFFSET_BASE_PX * Math.pow(r.height / SPLASH_OFFSET_BASELINE_H, SPLASH_OFFSET_EXP)), "bottom");
      sfx.death();
      overlayEl.style.display = "grid";
      setMascot("idle");
      return;
    }
    renderTask();
    sfx.splash();
    playSheetFx(ASSETS.splashSheet, tileCenterX, waterY(r) + (SPLASH_OFFSET_BASE_PX * Math.pow(r.height / SPLASH_OFFSET_BASELINE_H, SPLASH_OFFSET_EXP)), "bottom");
  }

  function correct(clickedBtn){
    // Invalidate current tablet immediately so it cannot drown after a correct click.
    task = null;
    showAnswerMark(clickedBtn, true);
    score += DIFFS[selected].correct;
    setHUD();
    sfx.correct();
    const burstX = tileX + 120;
    const burstY = tileY + 30;

    // scoring animation (quick color/scale pulse)
    scoreEl.classList.add('pulse');
    setTimeout(()=> scoreEl.classList.remove('pulse'), 350);

    // consecutive-correct -> award stars every 4
    consecutiveCorrect += 1;
    if(consecutiveCorrect >= 4){
      consecutiveCorrect = 0;
      awardCoinFromBurst(burstX, burstY);
    }

    playEnhancedBurst(burstX, burstY);
    setMascot("happy");
    setTimeout(()=> setMascot("idle"), 350);

    setTimeout(() => {
      if(running) renderTask();
    }, ANSWER_FEEDBACK_MS);
  }

  function wrong(clickedBtn){
    showAnswerMark(clickedBtn, false, 260);
    score += CONFIG.scoreWrong;
    setHUD();
    sfx.wrong();
    // break streak
    consecutiveCorrect = 0;
    // tile keeps falling
  }

  function loop(ts){
    if(!running || paused) return;
    if(!lastTs) lastTs = ts;
    const dt = Math.min(0.05, (ts - lastTs) / 1000);
    lastTs = ts;

    tileY += speedPxPerSec() * dt;
    tileEl.style.transform = `translate(${tileX}px, ${tileY}px)`;

    const r = rect();
    if(task && tileY >= waterY(r)){
      miss();
    }

    rafId = requestAnimationFrame(loop);
  }

  function start(diffKey){
    selected = diffKey;
    overlayEl.style.display = "none";
    paused = false;
    pauseBtn.classList.remove("paused");
    score = 0;
    lives = CONFIG.livesStart;
    prevCorrectIdx = -1;
    consecutiveCorrect = 0;
    setMascot("idle");
    setHUD();
    renderTask();
    running = true;
    lastTs = 0;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function stopGame(){
    running = false;
    paused = false;
    task = null;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = null;
    overlayEl.style.display = "grid";
    pauseBtn.classList.remove("paused");
  }

  function togglePause(){
    if(!running) return;
    paused = !paused;
    pauseBtn.classList.toggle("paused", paused);
    if(!paused){
      lastTs = 0;
      if(rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }
  }

  function exitGame(){
    try{
      if(window.parent && window.parent !== window){
        window.parent.postMessage({ type: "exitGame" }, "*");
        return;
      }
    }catch(_){}
    window.location.href = "../index.html";
  }


  pauseBtn.addEventListener("click", ()=>{ togglePause(); });
  exitBtn.addEventListener("click", ()=>{ exitGame(); });
  // difficulty buttons
  diffsEl.addEventListener("click", (e)=>{
    const btn = e.target.closest("[data-diff]");
    if(!btn) return;
    ensureAudio();
    start(btn.dataset.diff);
  });

  // answer clicks
  ansBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      if(!running || !task) return;
      ensureAudio();
      const v = Number(btn.dataset.val);
      if(v === task.answer) correct(btn);
      else wrong(btn);
    });
  });

  // initial HUD
  setHUD();
})();
</script>
