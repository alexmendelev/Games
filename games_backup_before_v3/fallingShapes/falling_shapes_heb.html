<!doctype html>
<html lang="he" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>צורות וצבעים נופלים</title>

  <link rel="preload" href="../fallingWords/assets/splash.mp3" as="audio" type="audio/mpeg">
  <link rel="preload" href="../fallingWords/assets/coin_drop.mp3" as="audio" type="audio/mpeg">

  <style>
    :root {
      --text:#ffffff;
      --muted:rgba(255,255,255,0.85);
      --ui:1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #06101f;
      color: var(--text);
      font-family: Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      line-height: 1.35;
      overflow: hidden;
    }

    .wrap {
      height: 100dvh;
      padding: 14px;
      display: flex;
      gap: 14px;
      direction: ltr;
    }

    .game {
      flex: 1;
      min-width: 280px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      background: #1a2a46 url("../fallingWords/assets/bg.png") center/cover no-repeat;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .mascot {
      position: absolute;
      left: 10%;
      bottom: 14px;
      width: min(calc(260px * var(--ui)), 34vw);
      height: auto;
      pointer-events: none;
      z-index: 110;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,0.40));
    }

    .tile {
      position: absolute;
      top: 0;
      left: 0;
      width: calc(300px * var(--ui));
      height: calc(124px * var(--ui));
      background: url("../fallingWords/assets/tablet.png") center/contain no-repeat;
      background-size:100% 100%;
      transform: translate(20px, -140px);
      pointer-events: none;
      z-index: 10;

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: calc(10px * var(--ui));
      align-items: center;
      justify-items: center;
      /* Keep icons away from the rocky tablet frame */
      padding: calc(12px * var(--ui)) calc(52px * var(--ui));
    }

    .tileBadge {
      width: calc(72px * var(--ui));
      height: calc(72px * var(--ui));
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.12);
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }
    #tileColor {
      background: transparent;
      border: 0;
      box-shadow: none;
    }
    #tileShape {
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .tileLabel {
      position: absolute;
      left: 50%;
      top: calc(100% - 4px);
      transform: translateX(-50%);
      font-size: calc(16px * var(--ui));
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      white-space: nowrap;
    }

    .shapeSvg {
      width: 78%;
      height: 78%;
      display: block;
    }
    .colorSprayImg {
      width: 98%;
      height: 98%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.22));
    }
    #tileShape .shapeSvg {
      width: 68%;
      height: 68%;
    }

    .side {
      width: min(calc(340px * var(--ui)), 45vw);
      display: flex;
      flex-direction: column;
      gap: 12px;
      direction: rtl;
    }

    .panel {
      background: rgba(10,18,40,0.55);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: calc(12px * var(--ui));
      backdrop-filter: blur(6px);
    }
    .panel.bottom { margin-top: auto; }
    .answersPanel { margin-top: 2%; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .panel.bottom .row{ justify-content:center; flex-wrap:nowrap; }
    .panel.bottom .actions{ display:flex; gap:8px; flex:0 0 auto; }
    .panel.bottom .ctrl{ height: calc(64px * var(--ui)); padding: 0 calc(10px * var(--ui)); font-size: calc(16px * var(--ui)); }

    .stat { color: var(--muted); font-size: calc(16px * var(--ui)); }
    .stat b {
      color: var(--text);
      font-size: calc(22px * var(--ui));
      margin-inline-start: 6px;
      font-weight: 900;
    }

    .answers { display: grid; grid-template-columns: repeat(4, 1fr); gap: calc(8px * var(--ui)); }

    .ans {
      height: calc(92px * var(--ui));
      border: 2px solid rgba(255,255,255,0.78);
      border-radius: calc(22px * var(--ui));
      background:
        radial-gradient(circle at 30% 22%, rgba(255,255,255,0.96), rgba(255,255,255,0.86) 48%, rgba(237,244,255,0.82) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.85),
        0 10px 22px rgba(0,0,0,0.22);
      cursor: pointer;
      padding: calc(8px * var(--ui));
      display: grid;
      place-items: center;
      overflow: hidden;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .ans svg {
      width: min(100%, calc(74px * var(--ui)));
      height: min(100%, calc(74px * var(--ui)));
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.25));
      pointer-events: none;
    }

    .ans:active { transform: scale(0.985); }
    .ans:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 12px 26px rgba(0,0,0,0.24);
    }

    .topStats{ justify-content: space-between; align-items:center; width:100%; gap: calc(8px * var(--ui)); flex-wrap: nowrap; }
    .topStats .block{ display:flex; flex-direction:column; align-items:center; gap:4px; }
    .topStats img.icon{ width: calc(92px * var(--ui)); height: auto; display:block; }
    .scoreBlock{ flex:0 0 auto; align-items:center !important; }
    .pointsPanel{
      min-height: calc(60px * var(--ui));
      width: calc(128px * var(--ui));
      min-width: calc(128px * var(--ui));
      max-width: calc(128px * var(--ui));
      padding: 0 calc(11px * var(--ui));
      display:flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: calc(14px * var(--ui));
      background: rgba(255,255,255,.08);
    }
    .pointsPanel b{
      font-size: calc(34px * var(--ui)) !important;
      line-height: 1;
      letter-spacing: .5px;
      font-variant-numeric: tabular-nums;
    }
    .vitalStats{ display:flex; gap: calc(8px * var(--ui)); flex-wrap:nowrap; }
    .vitalStats .block{ min-width: calc(58px * var(--ui)); }

    .ctrl{
      height: calc(54px * var(--ui));
      padding: 0 calc(16px * var(--ui));
      font-size: calc(20px * var(--ui));
      font-weight: 800;
      border-radius: calc(14px * var(--ui));
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .ctrl:active{ transform: translateY(1px); }
    .ctrl.iconBtn{
      width: calc(141px * var(--ui));
      min-width: calc(141px * var(--ui));
      padding: 0;
      background-color: rgba(255,255,255,.10);
      background-position: center;
      background-repeat: no-repeat;
      background-size: 70% 70%;
    }
    #pauseBtn{ background-image: url("../fallingWords/assets/pause.png"); }
    #pauseBtn.paused{ background-image: url("../fallingWords/assets/resume.png"); }
    #exitBtn{ background-image: url("../fallingWords/assets/exit.png"); }

    .overlay {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      z-index: 100;
    }

    .diffs{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .diffbtn{
      appearance:none;
      border: 2px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.12);
      color: var(--text);
      border-radius: 18px;
      cursor:pointer;
      font-weight: 900;
      font-size: clamp(28px, 4.2vw, 64px);
      padding: clamp(18px, 3.2vw, 44px) clamp(14px, 2.8vw, 36px);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
    }
    .diffbtn:active{ transform: scale(0.98); }

    .fx {
      position: absolute;
      pointer-events: none;
      background-repeat: no-repeat;
      image-rendering: auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25));
      z-index: 8;
    }
    .coinFly{
      position: fixed;
      left: 0;
      top: 0;
      width: clamp(34px, 5.2vw, 56px);
      height: auto;
      pointer-events: none;
      z-index: 320;
      will-change: transform, opacity;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }

    .panel { direction: rtl; text-align: right; }

    @media (max-width: 820px){
      .wrap { flex-direction: column; }
      .game{ flex: 0 0 52dvh; min-height: 52dvh; }
      .side { width: 100%; max-width: 100%; flex:1 1 auto; min-height:0; overflow:hidden; }
      .answersPanel { margin-top: 1%; }
      .panel.bottom { margin-top: 10px; }
      .side { gap: 8px; }
      .mascot { width: min(calc(220px * var(--ui)), 32vw); left: 6%; }
    }
    @media (max-height: 880px){
      .answersPanel { margin-top: 0; }
      .panel.bottom { margin-top: 6px; }
      .side { gap: 6px; }
      .answers { gap: calc(8px * var(--ui)); }
      .ans { height: calc(74px * var(--ui)); }
      .ans svg { width: calc(58px * var(--ui)); height: calc(58px * var(--ui)); }
    }
    @media (max-width: 1100px){
      .answers { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 820px){
      .answers { grid-template-columns: repeat(4, 1fr); }
      .ans { height: calc(84px * var(--ui)); }
      .ans svg { width: calc(66px * var(--ui)); height: calc(66px * var(--ui)); }
    }
    @media (max-width: 520px){
      .answers { grid-template-columns: repeat(3, 1fr); }
      .ans { height: calc(80px * var(--ui)); }
      .ans svg { width: calc(62px * var(--ui)); height: calc(62px * var(--ui)); }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="game" class="game">
    <img id="mascot" class="mascot" src="../fallingWords/assets/cat_idle.png" alt="" />
    <div id="tile" class="tile">
      <div id="tileShape" class="tileBadge"></div>
      <div id="tileColor" class="tileBadge"></div>
      <div id="tileLabel" class="tileLabel"></div>
    </div>

    <div id="overlay" class="overlay">
      <div class="menu">
        <div class="diffs" id="diffs">
          <button class="diffbtn" data-diff="easy">קל</button>
          <button class="diffbtn" data-diff="medium">בינוני</button>
          <button class="diffbtn" data-diff="hard">קשה</button>
          <button class="diffbtn" data-diff="super">סופר</button>
        </div>
      </div>
    </div>
  </div>

  <div class="side">
    <div class="panel">
      <div class="row topStats">
        <div class="block scoreBlock">
          <div class="stat scoreOnly pointsPanel"><b id="score">0</b></div>
        </div>
        <div class="vitalStats">
          <div class="block">
            <img id="coinIcon" src="../fallingNumbers/assets/kittendollar.png" alt="" class="icon">
            <div class="stat"><b id="coins">0</b></div>
          </div>
          <div class="block">
            <img src="../fallingNumbers/assets/lives.png" alt="" class="icon">
            <div class="stat"><b id="lives">10</b></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel answersPanel">
      <div class="answers" id="answers">
        <button class="ans" data-idx="0"></button>
        <button class="ans" data-idx="1"></button>
        <button class="ans" data-idx="2"></button>
        <button class="ans" data-idx="3"></button>
        <button class="ans" data-idx="4"></button>
        <button class="ans" data-idx="5"></button>
        <button class="ans" data-idx="6"></button>
        <button class="ans" data-idx="7"></button>
        <button class="ans" data-idx="8"></button>
        <button class="ans" data-idx="9"></button>
        <button class="ans" data-idx="10"></button>
        <button class="ans" data-idx="11"></button>
        <button class="ans" data-idx="12"></button>
        <button class="ans" data-idx="13"></button>
        <button class="ans" data-idx="14"></button>
        <button class="ans" data-idx="15"></button>
      </div>
    </div>

    <div class="panel bottom">
      <div class="row">
        <div class="actions">
          <button id="pauseBtn" class="ctrl iconBtn" type="button" aria-label="השהיה"></button>
          <button id="exitBtn" class="ctrl iconBtn" type="button" aria-label="יציאה"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const WATER_Y_RATIO = 0.72;

  const ASSETS = {
    splash: { url: "../fallingWords/assets/splash_sheet.png", sheetW: 1024, sheetH: 1024, cols: 4, rows: 4, frames: 16, fps: 30, scale: 0.75 },
    burst:  { url: "../fallingWords/assets/burst_sheet.png",  sheetW: 1024, sheetH: 1024, cols: 4, rows: 4, frames: 16, fps: 30, scale: 0.65 },
    mascotIdle: "../fallingWords/assets/cat_idle.png",
    mascotHappy: "../fallingWords/assets/cat_happy.png?v=2",
    mascotShame: "../fallingWords/assets/cat_shame.png"
  };

  const SHAPES = [
    { id: "circle", he: "עיגול" },
    { id: "square", he: "ריבוע" },
    { id: "triangle", he: "משולש" },
    { id: "diamond", he: "מעוין" },
    { id: "star", he: "כוכב" },
    { id: "heart", he: "לב" }
  ];

  const COLORS = [
    { id: "red", he: "אדום", hex: "#ef4444" },
    { id: "blue", he: "כחול", hex: "#3b82f6" },
    { id: "green", he: "ירוק", hex: "#22c55e" },
    { id: "yellow", he: "צהוב", hex: "#facc15" },
    { id: "purple", he: "סגול", hex: "#a855f7" },
    { id: "orange", he: "כתום", hex: "#f97316" }
  ];

  const CONFIG = {
    livesStart: 10,
    scoreWrong: -5,
    scoreMiss: -10,

    baseSpeed: 120,
    speedIncPerLevel: 15,
    pointsPerLevel: 120,

    tileWidth: 300,
    tileHeight: 124,
    tileMargin: 10,

    correctMin: 10,
    correctMax: 20,
    correctTimeCapSec: 2.0,

    sfxGain: 0.10
  };

  const DIFFICULTIES = {
    easy:   { label: "קל",     speedMul: 0.50, answerCount: 4 },
    medium: { label: "בינוני", speedMul: 1.00, answerCount: 8 },
    hard:   { label: "קשה",    speedMul: 1.20, answerCount: 12 },
    super:  { label: "סופר",   speedMul: 1.50, answerCount: 16 }
  };

  const gameEl = document.getElementById("game");
  const tileEl = document.getElementById("tile");
  const tileShapeEl = document.getElementById("tileShape");
  const tileColorEl = document.getElementById("tileColor");
  const tileLabelEl = document.getElementById("tileLabel");
  const overlay = document.getElementById("overlay");
  const pauseBtn = document.getElementById("pauseBtn");
  const exitBtn = document.getElementById("exitBtn");

  const scoreEl = document.getElementById("score");
  const coinEl = document.getElementById("coins");
  const coinIconEl = document.getElementById("coinIcon");
  const livesEl = document.getElementById("lives");

  const answersEl = document.getElementById("answers");
  const ansBtns = Array.from(answersEl.querySelectorAll(".ans"));

  const diffsEl = document.getElementById("diffs");
  const mascotEl = document.getElementById("mascot");
  const SPRAY_ASSET_URL = "assets/spray.png";
  const sprayTintCache = new Map();
  const sprayBaseImg = new Image();
  sprayBaseImg.decoding = "async";
  sprayBaseImg.src = SPRAY_ASSET_URL;
  sprayBaseImg.onload = () => {
    sprayTintCache.clear();
    if (task) tileColorEl.innerHTML = colorBadge(task.correct.colorHex);
  };

  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
  const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const shuffleInPlace = (arr) => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  };

  function shapeSvg(shapeId, colorHex, strokeHex = "#172554") {
    const fill = colorHex || "#ffffff";
    if (shapeId === "circle") return `<svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="34" fill="${fill}" stroke="${strokeHex}" stroke-width="8"/></svg>`;
    if (shapeId === "square") return `<svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true"><rect x="18" y="18" width="64" height="64" rx="8" fill="${fill}" stroke="${strokeHex}" stroke-width="8"/></svg>`;
    if (shapeId === "triangle") return `<svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 14 L84 82 L16 82 Z" fill="${fill}" stroke="${strokeHex}" stroke-width="8" stroke-linejoin="round"/></svg>`;
    if (shapeId === "diamond") return `<svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 10 L86 50 L50 90 L14 50 Z" fill="${fill}" stroke="${strokeHex}" stroke-width="8" stroke-linejoin="round"/></svg>`;
    if (shapeId === "star") return `<svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 10 L60 38 L90 38 L66 56 L75 84 L50 66 L25 84 L34 56 L10 38 L40 38 Z" fill="${fill}" stroke="${strokeHex}" stroke-width="7" stroke-linejoin="round"/></svg>`;
    return `<svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 86 C20 62 10 46 10 30 C10 18 20 10 32 10 C40 10 47 14 50 20 C53 14 60 10 68 10 C80 10 90 18 90 30 C90 46 80 62 50 86 Z" fill="${fill}" stroke="${strokeHex}" stroke-width="7" stroke-linejoin="round"/></svg>`;
  }

  function tintedSpraySrc(colorHex) {
    const key = String(colorHex || "").toLowerCase();
    if (!key) return SPRAY_ASSET_URL;
    if (sprayTintCache.has(key)) return sprayTintCache.get(key);
    if (!sprayBaseImg.complete || !sprayBaseImg.naturalWidth) return SPRAY_ASSET_URL;

    const w = sprayBaseImg.naturalWidth;
    const h = sprayBaseImg.naturalHeight;
    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");
    if (!ctx) return SPRAY_ASSET_URL;

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(sprayBaseImg, 0, 0, w, h);
    ctx.globalCompositeOperation = "multiply";
    ctx.fillStyle = key;
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = "destination-in";
    ctx.drawImage(sprayBaseImg, 0, 0, w, h);
    ctx.globalCompositeOperation = "source-over";

    const out = canvas.toDataURL("image/png");
    sprayTintCache.set(key, out);
    return out;
  }

  function colorBadge(colorHex) {
    return `<img class="colorSprayImg" src="${tintedSpraySrc(colorHex)}" alt="" aria-hidden="true">`;
  }

  function buildPair(shape, color) {
    return {
      id: `${shape.id}__${color.id}`,
      shapeId: shape.id,
      shapeHe: shape.he,
      colorId: color.id,
      colorHe: color.he,
      colorHex: color.hex,
      label: `${shape.he} ${color.he}`
    };
  }

  const PAIRS = [];
  for (const s of SHAPES) for (const c of COLORS) PAIRS.push(buildPair(s, c));

  let correctDeck = [];
  let deckPos = 0;
  let recentCorrectIds = [];
  const RECENT_CORRECT_LIMIT = 8;

  function refillCorrectDeck() {
    correctDeck = PAIRS.slice();
    shuffleInPlace(correctDeck);
    deckPos = 0;
  }

  function nextCorrectPair() {
    if (!correctDeck.length || deckPos >= correctDeck.length) refillCorrectDeck();
    let candidate = null;
    let tries = 0;
    while (tries < correctDeck.length) {
      if (deckPos >= correctDeck.length) refillCorrectDeck();
      candidate = correctDeck[deckPos++];
      if (!recentCorrectIds.includes(candidate.id)) break;
      tries += 1;
    }
    if (!candidate) candidate = choice(PAIRS);
    recentCorrectIds.push(candidate.id);
    if (recentCorrectIds.length > RECENT_CORRECT_LIMIT) recentCorrectIds.shift();
    return candidate;
  }

  function computeUi() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const s = Math.min(vw / 900, vh / 650);
    const portrait = vh > vw;
    return clamp(s * (portrait ? 0.92 : 1.0), 0.58, 1.0);
  }

  let waterLineY = 650 * WATER_Y_RATIO;
  let speedHeightMul = 1;

  function applyUi() {
    const ui = computeUi();
    document.documentElement.style.setProperty("--ui", ui.toFixed(3));
    CONFIG.tileWidth = Math.round(300 * ui);
    CONFIG.tileHeight = Math.round(124 * ui);
    CONFIG.tileMargin = Math.round(10 * ui);
    updateGameMetrics();
  }

  window.addEventListener("resize", applyUi);
  window.addEventListener("orientationchange", applyUi);
  applyUi();

  let selectedDiff = "medium";
  let activeAnswerCount = 8;
  let running = false;
  let paused = false;
  let rafId = null;
  let lastTs = 0;

  let score = 0;
  let coins = 0;
  let lives = CONFIG.livesStart;
  let consecutiveCorrect = 0;

  let task = null;
  let lockInputUntil = 0;

  function currentDiffCfg() { return DIFFICULTIES[selectedDiff] || DIFFICULTIES.medium; }
  function applyAnswerCount(count) {
    activeAnswerCount = Math.max(4, Math.min(ansBtns.length, Number(count) || 4));
    ansBtns.forEach((btn, idx) => {
      const on = idx < activeAnswerCount;
      btn.style.display = on ? "grid" : "none";
      btn.disabled = !on;
    });
  }
  function setDifficulty(d) {
    if (!DIFFICULTIES[d]) return;
    selectedDiff = d;
    applyAnswerCount(DIFFICULTIES[d].answerCount);
  }
  function getLevel() { return Math.max(1, Math.floor(score / CONFIG.pointsPerLevel) + 1); }
  function gameRect() { return gameEl.getBoundingClientRect(); }

  function updateGameMetrics() {
    const r = gameRect();
    const h = (r && r.height) ? r.height : 650;
    waterLineY = h * WATER_Y_RATIO;
    speedHeightMul = Math.max(0.72, Math.min(1.15, h / 650));
  }

  function getSpeed() {
    const base = CONFIG.baseSpeed + (getLevel() - 1) * CONFIG.speedIncPerLevel;
    return base * currentDiffCfg().speedMul * speedHeightMul;
  }

  function setHUD() {
    scoreEl.textContent = String(score);
    coinEl.textContent = String(coins);
    livesEl.textContent = String(lives);
  }

  function pointsForCorrect(reactionSec) {
    const t = clamp(reactionSec, 0, CONFIG.correctTimeCapSec);
    const frac = 1 - (t / CONFIG.correctTimeCapSec);
    return Math.round(CONFIG.correctMin + (CONFIG.correctMax - CONFIG.correctMin) * frac);
  }

  let audioCtx = null;
  let masterGain = null;
  const splashPool = Array.from({ length: 6 }, () => new Audio("../fallingWords/assets/splash.mp3"));
  const coinDropPool = Array.from({ length: 4 }, () => new Audio("../fallingWords/assets/coin_drop.mp3"));
  let splashI = 0;
  let coinDropI = 0;
  let audioUnlocked = false;

  function ensureAudio() {
    try {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = CONFIG.sfxGain;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    } catch (_) {}
    if (audioUnlocked) return;
    audioUnlocked = true;
  }

  function playFromPool(pool, idxRef) {
    const a = pool[idxRef.v++ % pool.length];
    a.volume = 0.9;
    try { a.currentTime = 0; } catch (_) {}
    a.play().catch(() => {});
  }

  function beep({freq=440, dur=0.12, type="sine", gain=1.0, when=0, rampTo=null}) {
    if (!audioCtx || !masterGain) return;
    const t0 = audioCtx.currentTime + when;
    const t1 = t0 + Math.max(0.01, dur);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (rampTo && rampTo > 0) osc.frequency.exponentialRampToValueAtTime(rampTo, t1);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t1);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t0);
    osc.stop(t1 + 0.02);
  }

  const sfx = {
    correct() { ensureAudio(); beep({freq: 880, dur: 0.06, type: "triangle", gain: 1.0, rampTo: 1320}); beep({freq: 1320, dur: 0.08, type: "sine", gain: 0.8, when: 0.05}); },
    wrong() { ensureAudio(); beep({freq: 240, dur: 0.10, type: "sine", gain: 0.9, rampTo: 180}); },
    splash() { ensureAudio(); playFromPool(splashPool, { v: splashI++ }); },
    coin() { ensureAudio(); playFromPool(coinDropPool, { v: coinDropI++ }); },
    death() { ensureAudio(); beep({freq: 420, rampTo: 110, dur: 0.75, type: "sawtooth", gain: 1.0}); }
  };

  window.addEventListener("pointerdown", ensureAudio, { once: true });

  function playFx(kind, x, y) {
    const cfg = ASSETS[kind];
    const frameW = cfg.sheetW / cfg.cols;
    const frameH = cfg.sheetH / cfg.rows;
    const el = document.createElement("div");
    el.className = "fx";
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    const scale = cfg.scale;
    el.style.width = `${frameW * scale}px`;
    el.style.height = `${frameH * scale}px`;
    el.style.backgroundImage = `url("${cfg.url}")`;
    el.style.backgroundSize = `${cfg.sheetW * scale}px ${cfg.sheetH * scale}px`;
    el.style.transform = (kind === "splash") ? "translate(-50%, -100%)" : "translate(-50%, -50%)";
    gameEl.appendChild(el);
    let frame = 0;
    const interval = Math.round(1000 / cfg.fps);
    const t = setInterval(() => {
      const col = frame % cfg.cols;
      const row = Math.floor(frame / cfg.cols);
      el.style.backgroundPosition = `${-(col * frameW * scale)}px ${-(row * frameH * scale)}px`;
      frame += 1;
      if (frame >= cfg.frames) {
        clearInterval(t);
        el.remove();
      }
    }, interval);
  }

  function popCoinIcon() {
    if (!coinIconEl || !coinIconEl.animate) return Promise.resolve();
    const anim = coinIconEl.animate(
      [
        { transform: "scale(1)", filter: "drop-shadow(0 0 0 rgba(255,215,64,0))" },
        { transform: "scale(1.34)", filter: "drop-shadow(0 0 10px rgba(255,215,64,.9))" },
        { transform: "scale(1)", filter: "drop-shadow(0 0 0 rgba(255,215,64,0))" }
      ],
      { duration: 330, easing: "cubic-bezier(.22,.61,.36,1)" }
    );
    return anim.finished.catch(() => {});
  }

  function animateCoinToHud(startXInGame, startYInGame) {
    if (!coinIconEl || !coinIconEl.getBoundingClientRect) return Promise.resolve();
    const gameR = gameEl.getBoundingClientRect();
    const coinR = coinIconEl.getBoundingClientRect();
    const startX = gameR.left + startXInGame;
    const startY = gameR.top + startYInGame;
    const endX = coinR.left + coinR.width / 2;
    const endY = coinR.top + coinR.height / 2;
    const ctrlX = (startX + endX) / 2;
    const ctrlY = Math.min(startY, endY) - 120;
    const flyEl = document.createElement("img");
    flyEl.className = "coinFly";
    flyEl.src = coinIconEl.currentSrc || coinIconEl.src;
    flyEl.alt = "";
    document.body.appendChild(flyEl);
    const frames = [
      { transform: `translate(${startX}px, ${startY}px) translate(-50%, -50%) scale(.35)`, opacity: 0.0, offset: 0 },
      { transform: `translate(${startX}px, ${startY - 8}px) translate(-50%, -50%) scale(.95)`, opacity: 1.0, offset: 0.14 },
      { transform: `translate(${ctrlX}px, ${ctrlY}px) translate(-50%, -50%) scale(1.05)`, opacity: 1.0, offset: 0.72 },
      { transform: `translate(${endX}px, ${endY}px) translate(-50%, -50%) scale(.62)`, opacity: 1.0, offset: 1 }
    ];
    const anim = flyEl.animate(frames, { duration: 2480, easing: "cubic-bezier(.17,.67,.27,1)" });
    return anim.finished.catch(() => {}).then(() => { flyEl.remove(); });
  }

  function awardCoinFromBurst(startXInGame, startYInGame) {
    animateCoinToHud(startXInGame, startYInGame)
      .then(() => { sfx.coin(); return popCoinIcon(); })
      .finally(() => { coins += 1; setHUD(); });
  }

  let mascotPulseToken = 0;
  function mascotHappyPulse() {
    const token = ++mascotPulseToken;
    mascotEl.src = ASSETS.mascotHappy;
    setTimeout(() => { if (token === mascotPulseToken) mascotEl.src = ASSETS.mascotIdle; }, 350);
  }

  let mascotShameToken = 0;
  function mascotShamePulse() {
    const token = ++mascotShameToken;
    mascotEl.src = ASSETS.mascotShame;
    setTimeout(() => { if (token === mascotShameToken) mascotEl.src = ASSETS.mascotIdle; }, 700);
  }

  function generateTask() {
    const correct = nextCorrectPair();
    const targetCount = activeAnswerCount;
    const sameShapeDiffColor = PAIRS.filter((p) => p.shapeId === correct.shapeId && p.colorId !== correct.colorId);
    const diffShapeSameColor = PAIRS.filter((p) => p.colorId === correct.colorId && p.shapeId !== correct.shapeId);
    const others = PAIRS.filter((p) => p.id !== correct.id && p.shapeId !== correct.shapeId && p.colorId !== correct.colorId);
    shuffleInPlace(sameShapeDiffColor);
    shuffleInPlace(diffShapeSameColor);
    shuffleInPlace(others);

    const options = [correct];
    const usedIds = new Set([correct.id]);
    const pushIfNew = (arr, maxToTake = arr.length) => {
      let taken = 0;
      for (const item of arr) {
        if (taken >= maxToTake || options.length >= targetCount) break;
        if (usedIds.has(item.id)) continue;
        options.push(item);
        usedIds.add(item.id);
        taken += 1;
      }
    };

    // Ensure distractors include same shape with different colors.
    pushIfNew(sameShapeDiffColor, Math.min(3, targetCount - 1));
    // Ensure at least one option has the correct color with a different shape.
    pushIfNew(diffShapeSameColor, 2);
    // Fill any remaining slots.
    pushIfNew(others);
    pushIfNew(sameShapeDiffColor);
    pushIfNew(diffShapeSameColor);

    shuffleInPlace(options);
    const r = gameRect();
    const maxX = Math.max(CONFIG.tileMargin, r.width - CONFIG.tileWidth - CONFIG.tileMargin);
    const x = randInt(CONFIG.tileMargin, Math.floor(maxX));
    const y = -CONFIG.tileHeight;
    return { correct, options, x, y };
  }

  function renderTask() {
    tileShapeEl.innerHTML = shapeSvg(task.correct.shapeId, "#f8fafc", "#1e293b");
    tileColorEl.innerHTML = colorBadge(task.correct.colorHex);
    tileLabelEl.textContent = task.correct.label;
    tileEl.style.transform = `translate(${task.x}px, ${task.y}px)`;
    for (let i = 0; i < activeAnswerCount; i++) {
      const option = task.options[i];
      ansBtns[i].dataset.value = option.id;
      ansBtns[i].innerHTML = shapeSvg(option.shapeId, option.colorHex, "#1e293b");
    }
    for (let i = activeAnswerCount; i < ansBtns.length; i++) {
      delete ansBtns[i].dataset.value;
      ansBtns[i].innerHTML = "";
    }
  }

  function spawnTask() {
    task = generateTask();
    task.spawnedAt = performance.now();
    renderTask();
  }

  function startGame() {
    ensureAudio();
    updateGameMetrics();
    running = true;
    paused = false;
    pauseBtn.classList.remove("paused");
    overlay.style.display = "none";
    lastTs = 0;
    spawnTask();
    setHUD();
    loop(performance.now());
  }

  function stopGame() {
    running = false;
    paused = false;
    pauseBtn.classList.remove("paused");
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    overlay.style.display = "grid";
  }

  function exitGame() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "exitGame" }, "*");
        return;
      }
    } catch (_) {}
    window.location.href = "../index.html";
  }

  function resetState() {
    score = 0;
    coins = 0;
    lives = CONFIG.livesStart;
    consecutiveCorrect = 0;
    paused = false;
    pauseBtn.classList.remove("paused");
    correctDeck = [];
    deckPos = 0;
    recentCorrectIds = [];
    setHUD();
    spawnTask();
  }

  function handleAnswer(idx) {
    if (!running || paused) return;
    if (idx < 0 || idx >= activeAnswerCount) return;
    const now = performance.now();
    if (now < lockInputUntil) return;
    const val = String(ansBtns[idx].dataset.value || "");
    const isCorrect = (val === task.correct.id);
    if (isCorrect) {
      const currentTask = task;
      task = null;
      const rtSec = (now - currentTask.spawnedAt) / 1000;
      const burstX = currentTask.x + CONFIG.tileWidth / 2;
      const burstY = currentTask.y + CONFIG.tileHeight / 2;
      score += pointsForCorrect(rtSec);
      consecutiveCorrect += 1;
      if (consecutiveCorrect >= 4) {
        consecutiveCorrect = 0;
        awardCoinFromBurst(burstX, burstY);
      }
      playFx("burst", burstX, burstY);
      sfx.correct();
      mascotHappyPulse();
      setHUD();
      lockInputUntil = now + 120;
      if (running) spawnTask();
    } else {
      score += CONFIG.scoreWrong;
      consecutiveCorrect = 0;
      sfx.wrong();
      setHUD();
    }
  }

  function loop(ts) {
    if (!running || paused) return;
    if (!task) {
      rafId = requestAnimationFrame(loop);
      return;
    }
    if (!lastTs) lastTs = ts;
    const dt = Math.min(0.05, (ts - lastTs) / 1000);
    lastTs = ts;
    task.y += getSpeed() * dt;
    tileEl.style.transform = `translate(${task.x}px, ${task.y}px)`;
    const DROWN_RATIO = 0.4;
    if (task && task.y + CONFIG.tileHeight * DROWN_RATIO >= waterLineY) {
      const drownX = task.x + CONFIG.tileWidth / 2;
      score += CONFIG.scoreMiss;
      lives -= 1;
      consecutiveCorrect = 0;
      setHUD();
      mascotShamePulse();
      if (lives <= 0) {
        playFx("splash", drownX, waterLineY + 120);
        sfx.splash();
        sfx.death();
        stopGame();
        return;
      }
      spawnTask();
      playFx("splash", drownX, waterLineY + 120);
      sfx.splash();
    }
    rafId = requestAnimationFrame(loop);
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    pauseBtn.classList.toggle("paused", paused);
    if (!paused) {
      lastTs = 0;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }
  }

  diffsEl.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-diff]");
    if (!btn || running) return;
    setDifficulty(btn.dataset.diff);
    resetState();
    startGame();
  });

  pauseBtn.addEventListener("click", () => { ensureAudio(); togglePause(); });
  exitBtn.addEventListener("click", () => { ensureAudio(); exitGame(); });
  answersEl.addEventListener("click", (e) => {
    ensureAudio();
    const btn = e.target.closest("button.ans");
    if (!btn) return;
    handleAnswer(Number(btn.dataset.idx));
  });
  window.addEventListener("keydown", (e) => {
    if (!running) return;
    const keyNum = Number(e.key);
    if (Number.isInteger(keyNum) && keyNum >= 1 && keyNum <= Math.min(activeAnswerCount, 9)) {
      ensureAudio();
      handleAnswer(keyNum - 1);
    }
  });

  setDifficulty("medium");
  setHUD();
})();
</script>
