<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>מאיה וחברים — משחקים</title>

  <style>
    :root{
      --bg:#06101f;
      --panel:rgba(10,18,40,0.70);
      --panel2:rgba(10,18,40,0.55);
      --border:rgba(255,255,255,0.16);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.82);
      --shadow:0 20px 60px rgba(0,0,0,0.35);
      --r:18px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 20% 0%, rgba(90,120,255,0.18), transparent 55%),
                  radial-gradient(900px 600px at 80% 20%, rgba(255,170,60,0.14), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow-x:hidden;
    }

    .wrap{
      min-height: 100dvh;
      padding: 18px;
      padding-top: calc(18px + env(safe-area-inset-top));
      padding-right: calc(18px + env(safe-area-inset-right));
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      padding-left: calc(18px + env(safe-area-inset-left));
      display:flex;
      justify-content:center;
    }

    .container{ width:min(980px, 100%); }

    /* Header / hero */
    .hero{
      display:grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items:center;
      margin-bottom: 14px;
    }
    @media (max-width: 760px){
      .hero{ grid-template-columns: 1fr; text-align:center; }
    }

    .logoCard{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 14px;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height: 180px;
    }

    .logo{
      width: 220px;
      height: auto;
      display:block;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,0.35));
    }
    @media (max-width: 760px){
      .logo{ width: 200px; }
    }

    .heroText{
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 16px;
    }

    .title{
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.1;
    }


    /* Game tiles */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
    }
    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }

    .tile{
      display:block;
      text-decoration:none;
      color: inherit;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      overflow:hidden;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transform: translateZ(0);
    }
    .tile:active{
      transform: translateY(1px);
    }

	@media (hover: hover) and (pointer: fine){
	  .tile:hover{ border-color: rgba(255,255,255,0.26); }
	}

    .thumb{
      height: 170px;
      background: #1a2a46 center/cover no-repeat;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position:relative;
    }
    .thumb::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(600px 220px at 20% 10%, rgba(255,255,255,0.08), transparent 60%),
                  linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.28));
      pointer-events:none;
    }

    .label{
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .name{
      margin:0;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }

    .chev{
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }

    .footer{
      margin-top: 14px;
      color: rgba(255,255,255,0.60);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="container">

      <!-- HERO -->
      <div class="hero">
        <div class="logoCard">
          <!-- put your logo file here -->
          <img class="logo" src="assets/main_logo.png" alt="מאיה וחברים" />
        </div>
        <div class="heroText">
          <h1 class="title">משחקים מגניבים</h1>
        </div>
      </div>

      <!-- GAME GRID (whole tile is clickable) -->
      <div class="grid">
        <!-- 1) Falling math -->
        <a class="tile" href="fallingNumbers/falling_math_heb.html" aria-label="תרגילים נופלים">
          <div class="thumb" style="background-image:url('fallingNumbers/assets/bg.png');"></div>
          <div class="label">
            <h2 class="name">תרגילים נופלים</h2>
            <div class="chev" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M10 6l6 6-6 6" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </a>

        <!-- 2) Placeholder -->
        <a class="tile" href="game2.html" aria-label="משחק 2">
          <div class="thumb" style="background-image:linear-gradient(135deg,#243b6b,#1a2a46);"></div>
          <div class="label">
            <h2 class="name">משחק 2</h2>
            <div class="chev" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M10 6l6 6-6 6" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </a>

        <!-- Add more tiles here -->
      </div>

      <div class="footer">מאיה וחברים</div>
    </div>
  </div>
</body>
</html>
