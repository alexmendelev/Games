<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>מאיה וחברים - משחקים</title>
  <style>
    :root{
      --bg:#06101f;
      --panel:rgba(10,18,40,0.72);
      --border:rgba(255,255,255,0.18);
      --text:#fff;
      --r:18px;
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(90,120,255,0.18), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, rgba(255,170,60,0.14), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family: Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow:hidden;
    }
    body.booting .page{
      opacity:0;
      pointer-events:none;
    }

    .page{
      height:100dvh;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:14px;
      padding-top:calc(14px + env(safe-area-inset-top));
      padding-right:calc(14px + env(safe-area-inset-right));
      padding-bottom:calc(14px + env(safe-area-inset-bottom));
      padding-left:calc(14px + env(safe-area-inset-left));
    }

    .top{
      display:flex;
      justify-content:center;
      align-items:center;
      flex:0 0 auto;
      min-height:0;
      align-self:stretch;
      background:transparent;
      border-radius:0;
      box-shadow:none;
      backdrop-filter:none;
      padding:clamp(8px, 2vh, 18px) 0 0;
    }
    .logo{
      height:clamp(120px, 20vh, 220px);
      max-width:min(90vw, 980px);
      width:auto;
      display:block;
      object-fit:contain;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,.35));
    }

    .games{
      min-height:0;
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:0;
    }
    .gameBtn{
      border:0;
      border-radius:var(--r);
      background:transparent;
      box-shadow:none;
      backdrop-filter:none;
      cursor:pointer;
      padding:0;
      flex:1 1 0;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    .gameBtn:active{ transform:translateY(1px); }
    .icon{
      display:block;
      width:auto;
      height:auto;
      max-width:90%;
      max-height:90%;
      object-fit:contain;
      object-position:center center;
      transform:none;
      pointer-events:none;
      user-select:none;
      filter:none;
    }

    @media (max-width:760px){
      .page{ gap:4px; padding:8px; }
      .logo{ height:clamp(104px, 18vh, 168px); }
      .games{ gap:0; }
    }

    body.landscape .games{
      flex-direction: row;
      gap: 0;
    }

    #loadingOverlay{
      position:fixed;
      inset:0;
      z-index:30000;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(900px 560px at 50% 18%, rgba(255,255,255,.10), transparent 60%),
        rgba(6,16,31,.94);
      backdrop-filter:blur(6px);
      color:#fff;
      padding:24px;
      text-align:center;
    }
    #loadingBox{
      width:min(700px, 92vw);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:clamp(18px, 3vh, 28px);
    }
    #loadingSplash{
      display:block;
      width:min(580px, 82vw);
      max-height:48vh;
      object-fit:contain;
      filter:drop-shadow(0 18px 32px rgba(0,0,0,.35));
    }
    #loadingMeta{
      width:min(420px, 78vw);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    #loadingTitle{ font-size:clamp(16px, 2.4vh, 22px); font-weight:900; margin:0; }
    #loadingText{ font-size:clamp(14px, 1.8vh, 16px); margin:0; opacity:.88; }
    .bar{
      height:14px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.14);
      box-shadow:inset 0 1px 3px rgba(0,0,0,.28);
    }
    .bar > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #fde68a 0%, #f59e0b 48%, #fb7185 100%);
      transition:width 120ms linear;
    }

    #gameModal{
      position:fixed;
      inset:0;
      z-index:15000;
      display:none;
      background:rgba(0,0,0,.72);
    }
    #gameFrame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background:#000;
    }
  </style>
</head>
<body class="booting">
  <div id="loadingOverlay" aria-live="polite">
    <div id="loadingBox">
      <img id="loadingSplash" src="assets/starting.png" alt="">
      <div id="loadingMeta">
        <h2 id="loadingTitle">טוען משחקים...</h2>
        <div class="bar"><div id="loadingBar"></div></div>
        <p id="loadingText">0%</p>
      </div>
    </div>
  </div>

  <main class="page">
    <section class="top">
      <img class="logo" src="assets/title.png" alt="מאיה וחברים" />
    </section>

    <section class="games">
      <button class="gameBtn" type="button" data-game="fallingNumbers/falling_math_heb.html?v=20260307fx3" aria-label="תרגילים נופלים">
        <img class="icon" src="assets/numbers.png" alt="">
      </button>
      <button class="gameBtn" type="button" data-game="fallingWords/falling_words_heb.html" aria-label="מילים נופלות">
        <img class="icon" src="assets/words.png" alt="">
      </button>
      <button class="gameBtn" type="button" data-game="fallingShapes/falling_shapes_heb.html" aria-label="צורות וצבעים נופלים">
        <img class="icon" src="assets/shapes.png" alt="">
      </button>
    </section>
  </main>

  <div id="gameModal" aria-hidden="true">
    <iframe id="gameFrame" allow="fullscreen; autoplay" title="Game"></iframe>
  </div>

  <script>
    const GAME_ASSETS = {
      "fallingNumbers/falling_math_heb.html": {
        images: [
          "fallingNumbers/assets/bg.png",
          "fallingNumbers/assets/tablet.png",
          "fallingNumbers/assets/btn.png",
          "fallingNumbers/assets/cat_idle.png",
          "fallingNumbers/assets/cat_happy.png",
          "fallingNumbers/assets/cat_shame.png",
          "fallingNumbers/assets/burst_sheet.png",
          "fallingNumbers/assets/splash_sheet.png",
          "fallingNumbers/assets/star.svg",
          "fallingNumbers/assets/heart.svg"
        ],
        audio: [
          "fallingNumbers/assets/splash.mp3",
          "fallingNumbers/assets/coin_drop.mp3"
        ]
      },
      "fallingWords/falling_words_heb.html": {
        images: [
          "fallingWords/assets/bg.png",
          "fallingWords/assets/tablet.png",
          "fallingWords/assets/btn.png",
          "fallingWords/assets/cat_idle.png",
          "fallingWords/assets/cat_happy.png",
          "fallingWords/assets/cat_shame.png",
          "fallingWords/assets/burst_sheet.png",
          "fallingWords/assets/splash_sheet.png",
          "fallingNumbers/assets/kittendollar.png",
          "fallingNumbers/assets/lives.png"
        ],
        audio: [
          "fallingWords/assets/splash.mp3",
          "fallingWords/assets/coin_drop.mp3"
        ]
      },
      "fallingShapes/falling_shapes_heb.html": {
        images: [
          "fallingWords/assets/bg.png",
          "fallingWords/assets/tablet.png",
          "fallingWords/assets/btn.png",
          "fallingShapes/assets/spray.png",
          "fallingWords/assets/cat_idle.png",
          "fallingWords/assets/cat_happy.png",
          "fallingWords/assets/cat_shame.png",
          "fallingWords/assets/burst_sheet.png",
          "fallingWords/assets/splash_sheet.png",
          "fallingNumbers/assets/kittendollar.png",
          "fallingNumbers/assets/lives.png"
        ],
        audio: [
          "fallingWords/assets/splash.mp3",
          "fallingWords/assets/coin_drop.mp3"
        ]
      }
    };

    const MENU_ASSETS = {
      images: [
        "assets/starting.png",
        "assets/title.png",
        "assets/numbers.png",
        "assets/words.png",
        "assets/shapes.png"
      ]
    };

    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingText = document.getElementById("loadingText");
    const loadingBar = document.getElementById("loadingBar");

    const modal = document.getElementById("gameModal");
    const frame = document.getElementById("gameFrame");

    function applyMenuLayoutMode() {
      const landscape = window.innerWidth > window.innerHeight;
      document.body.classList.toggle("landscape", landscape);
      document.body.classList.toggle("portrait", !landscape);
      document.body.classList.toggle("wide", window.innerWidth >= 1000);
    }
    window.addEventListener("resize", applyMenuLayoutMode);
    window.addEventListener("orientationchange", applyMenuLayoutMode);
    applyMenuLayoutMode();

    function showLoading(titleText) {
      loadingTitle.textContent = titleText || "טוען משחקים...";
      loadingText.textContent = "0%";
      loadingBar.style.width = "0%";
      loadingOverlay.style.display = "flex";
    }

    function hideLoading() {
      loadingOverlay.style.display = "none";
    }

    function updateLoading(done, total) {
      const pct = total ? Math.round((done / total) * 100) : 0;
      loadingText.textContent = total ? `${pct}% · ${done}/${total}` : "0%";
      loadingBar.style.width = `${pct}%`;
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = async () => {
          if (img.decode) {
            try { await img.decode(); } catch (_) {}
          }
          resolve();
        };
        img.onerror = () => reject(new Error("Failed image: " + url));
        img.src = url;
      });
    }

    function loadAudioWithTimeout(url, timeoutMs = 2500) {
      return new Promise((resolve) => {
        const a = new Audio();
        let done = false;

        const finish = () => {
          if (done) return;
          done = true;
          cleanup();
          resolve();
        };

        const cleanup = () => {
          a.removeEventListener("canplaythrough", finish);
          a.removeEventListener("loadeddata", finish);
          a.removeEventListener("error", finish);
        };

        a.preload = "auto";
        a.addEventListener("canplaythrough", finish, { once: true });
        a.addEventListener("loadeddata", finish, { once: true });
        a.addEventListener("error", finish, { once: true });
        a.src = url;
        try { a.load(); } catch (_) {}

        setTimeout(finish, timeoutMs);
      });
    }

    function collectBootAssetLists() {
      const images = new Set(MENU_ASSETS.images);
      const audio = new Set();

      Object.values(GAME_ASSETS).forEach((pack) => {
        (pack.images || []).forEach((url) => images.add(url));
        (pack.audio || []).forEach((url) => audio.add(url));
      });

      return {
        images: Array.from(images),
        audio: Array.from(audio)
      };
    }

    async function preloadBootAssets() {
      const { images, audio } = collectBootAssetLists();
      const total = images.length + audio.length;
      let done = 0;

      updateLoading(done, total);
      const tick = () => { done += 1; updateLoading(done, total); };

      const imgPromises = images.map((u) =>
        loadImage(u)
          .catch((err) => { console.warn(err); })
          .finally(tick)
      );
      const audPromises = audio.map((u) =>
        loadAudioWithTimeout(u)
          .catch((err) => { console.warn(err); })
          .finally(tick)
      );
      await Promise.allSettled([...imgPromises, ...audPromises]);
    }

    async function openGame(url) {
      if (document.body.classList.contains("booting")) return;
      try {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
        if (req && !document.fullscreenElement && !document.webkitFullscreenElement) {
          await req.call(el, { navigationUI: "hide" });
        }
      } catch (_) {}
      frame.src = url;
      modal.style.display = "block";
      modal.setAttribute("aria-hidden", "false");
    }

    function closeGame() {
      frame.src = "about:blank";
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }

    document.querySelectorAll("[data-game]").forEach((btn) => {
      btn.addEventListener("click", () => openGame(btn.getAttribute("data-game")));
    });

    window.addEventListener("message", (e) => {
      const data = e.data || {};
      if (data.type === "exitGame") closeGame();
    });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.style.display === "block") closeGame();
    });

    async function bootMenu() {
      showLoading("טוען משחקים...");
      try {
        await preloadBootAssets();
      } catch (e) {
        console.error(e);
      } finally {
        document.body.classList.remove("booting");
        hideLoading();
      }
    }

    bootMenu();
  </script>
</body>
</html>
