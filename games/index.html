<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>מאיה וחברים — משחקים</title>

  <style>
    :root{
      --bg:#06101f;
      --panel:rgba(10,18,40,0.70);
      --panel2:rgba(10,18,40,0.55);
      --border:rgba(255,255,255,0.16);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.82);
      --shadow:0 20px 60px rgba(0,0,0,0.35);
      --r:18px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 20% 0%, rgba(90,120,255,0.18), transparent 55%),
                  radial-gradient(900px 600px at 80% 20%, rgba(255,170,60,0.14), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow-x:hidden;
    }

    .wrap{
      min-height: 100dvh;
      padding: 18px;
      padding-top: calc(18px + env(safe-area-inset-top));
      padding-right: calc(18px + env(safe-area-inset-right));
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      padding-left: calc(18px + env(safe-area-inset-left));
      display:flex;
      justify-content:center;
    }

    .container{ width:min(980px, 100%); }

    /* Header / hero */
    .hero{
      display:grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items:center;
      margin-bottom: 14px;
    }
    @media (max-width: 760px){
      .hero{ grid-template-columns: 1fr; text-align:center; }
    }

    .logoCard{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 14px;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height: 180px;
    }

    .logo{
      width: 220px;
      height: auto;
      display:block;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,0.35));
    }
    @media (max-width: 760px){
      .logo{ width: 200px; }
    }

    .heroText{
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 16px;
    }

    .title{
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.1;
    }

    /* Game tiles */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
    }
    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }

    .tile{
      display:block;
      text-decoration:none;
      color: inherit;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      overflow:hidden;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transform: translateZ(0);
    }
    .tile:active{
      transform: translateY(1px);
    }

    @media (hover: hover) and (pointer: fine){
      .tile:hover{ border-color: rgba(255,255,255,0.26); }
    }

    .thumb{
      height: 170px;
      background: #1a2a46 center/cover no-repeat;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position:relative;
    }
    .thumb::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(600px 220px at 20% 10%, rgba(255,255,255,0.08), transparent 60%),
                  linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.28));
      pointer-events:none;
    }

    .label{
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .name{
      margin:0;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }

    .chev{
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }

    .footer{
      margin-top: 14px;
      color: rgba(255,255,255,0.60);
      font-size: 12px;
      text-align: center;
    }

    /* Loading overlay */
    #loadingOverlay{
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6,16,31,0.92);
      backdrop-filter: blur(6px);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    #loadingBox{
      width: min(520px, 92vw);
      background: rgba(10,18,40,0.75);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      padding: 18px;
    }
    #loadingTitle{
      font-size: 22px;
      font-weight: 900;
      margin: 0 0 10px 0;
    }
    #loadingText{
      font-size: 16px;
      margin: 0 0 12px 0;
      opacity: 0.88;
    }
    .bar{
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .bar > div{
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.70);
      transition: width 120ms linear;
    }

    /* Fullscreen hint button (shown only if not fullscreen) */
    #fsBtn{
      margin-top: 14px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 14px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      font: 800 18px Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 12px 14px;
      cursor: pointer;
    }
    #fsNote{
      margin: 10px 0 0 0;
      font-size: 13px;
      opacity: 0.70;
      line-height: 1.35;
    }
  </style>
</head>

<body>

  <!-- Loading overlay (removed after assets load) -->
  <div id="loadingOverlay" aria-live="polite">
    <div id="loadingBox">
      <h2 id="loadingTitle">טוען…</h2>
      <p id="loadingText">0/0</p>
      <div class="bar"><div id="loadingBar"></div></div>

      <!-- Fullscreen (requires user gesture; shows after loading) -->
      <button id="fsBtn" type="button" style="display:none;">מסך מלא</button>
      <p id="fsNote" style="display:none;">
        דפדפנים לא מאפשרים כניסה אוטומטית למסך מלא בלי לחיצה.
      </p>
    </div>
  </div>

  <div class="wrap">
    <div class="container">

      <!-- HERO -->
      <div class="hero">
        <div class="logoCard">
          <img class="logo" src="assets/main_logo.png" alt="מאיה וחברים" />
        </div>
        <div class="heroText">
          <h1 class="title">משחקים מגניבים</h1>
        </div>
      </div>

      <!-- GAME GRID (whole tile is clickable) -->
      <div class="grid">
        <!-- 1) Falling math -->
        <a class="tile" href="fallingNumbers/falling_math_heb.html" aria-label="תרגילים נופלים">
          <div class="thumb" style="background-image:url('fallingNumbers/assets/bg.png');"></div>
          <div class="label">
            <h2 class="name">תרגילים נופלים</h2>
            <div class="chev" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M10 6l6 6-6 6" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </a>

        <!-- 2) Placeholder -->
        <a class="tile" href="game2.html" aria-label="משחק 2">
          <div class="thumb" style="background-image:linear-gradient(135deg,#243b6b,#1a2a46);"></div>
          <div class="label">
            <h2 class="name">משחק 2</h2>
            <div class="chev" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M10 6l6 6-6 6" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </a>

        <!-- Add more tiles here -->
      </div>

      <div class="footer">מאיה וחברים</div>
    </div>
  </div>

  <script>
    // ----------------------------
    // 1) PRELOAD ALL ASSETS BEFORE "READY"
    // ----------------------------

    // Add here anything you want preloaded for this landing page AND for the game(s).
    // (Images, sprites, audio, etc.)
    const ASSETS = {
      images: [
        'assets/main_logo.png',
        'fallingNumbers/assets/bg.png',

        // game assets (add/remove based on what your game actually uses)
        'fallingNumbers/assets/tablet.png',
        'fallingNumbers/assets/btn.png',
        'fallingNumbers/assets/cat_idle.png',
        'fallingNumbers/assets/cat_happy.png',
        'fallingNumbers/assets/burst_sheet.png',
        'fallingNumbers/assets/splash_sheet.png',
      ],
      audio: [
        // If your game has these files, preload them.
        // If not, remove/rename.
        'fallingNumbers/assets/sfx_ok.mp3',
        'fallingNumbers/assets/sfx_wrong.mp3',
        'fallingNumbers/assets/sfx_splash.mp3',
        'fallingNumbers/assets/sfx_death.mp3',
      ]
    };

    const $overlay = document.getElementById('loadingOverlay');
    const $text = document.getElementById('loadingText');
    const $bar = document.getElementById('loadingBar');
    const $fsBtn = document.getElementById('fsBtn');
    const $fsNote = document.getElementById('fsNote');

    function updateLoading(done, total) {
      $text.textContent = `${done}/${total}`;
      $bar.style.width = total ? `${Math.round((done / total) * 100)}%` : '0%';
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = async () => {
          if (img.decode) { try { await img.decode(); } catch(e) {} }
          resolve();
        };
        img.onerror = () => reject(new Error('Failed image: ' + url));
        img.src = url;
      });
    }

    function loadAudio(url) {
      // Preload fetch/prepare only. Playback still requires a user gesture on mobile.
      return new Promise((resolve, reject) => {
        const a = new Audio();
        a.preload = 'auto';
        a.src = url;

        const ok = () => { cleanup(); resolve(); };
        const bad = () => { cleanup(); reject(new Error('Failed audio: ' + url)); };
        const cleanup = () => {
          a.removeEventListener('canplaythrough', ok);
          a.removeEventListener('error', bad);
          a.removeEventListener('loadeddata', ok);
        };

        // canplaythrough is not always reliable; loadeddata is a fallback
        a.addEventListener('canplaythrough', ok, { once: true });
        a.addEventListener('loadeddata', ok, { once: true });
        a.addEventListener('error', bad, { once: true });

        a.load();
      });
    }

    async function preloadAll() {
      const imgs = ASSETS.images || [];
      const auds = ASSETS.audio || [];
      const total = imgs.length + auds.length;
      let done = 0;

      updateLoading(done, total);

      const tick = () => {
        done++;
        updateLoading(done, total);
      };

      // Load images (hard-fail if missing: you probably want to know)
      const imgPromises = imgs.map(u => loadImage(u).then(tick));

      // Load audio (soft-fail: don't block page if a sound file is missing)
      const audPromises = auds.map(u =>
        loadAudio(u).then(tick).catch(err => {
          console.warn(err);
          tick();
        })
      );

      await Promise.all([...imgPromises, ...audPromises]);
    }

    // ----------------------------
    // 2) FULLSCREEN (USER GESTURE ONLY)
    // ----------------------------

    async function requestFullscreen() {
      const el = document.documentElement;
      try {
        if (!document.fullscreenElement && el.requestFullscreen) {
          await el.requestFullscreen({ navigationUI: "hide" });
        }
      } catch (e) {
        console.warn('Fullscreen failed:', e);
      }
    }

    function showFullscreenControlsIfNeeded() {
      const canFS = !!document.documentElement.requestFullscreen;
      const isFS = !!document.fullscreenElement;

      if (canFS && !isFS) {
        $fsBtn.style.display = '';
        $fsNote.style.display = '';
      } else {
        $fsBtn.style.display = 'none';
        $fsNote.style.display = 'none';
      }
    }

    $fsBtn.addEventListener('click', async () => {
      await requestFullscreen();
      showFullscreenControlsIfNeeded();
      // keep overlay up; user can click a game tile after this
    });

    document.addEventListener('fullscreenchange', showFullscreenControlsIfNeeded);

    // ----------------------------
    // BOOT
    // ----------------------------
    window.addEventListener('load', async () => {
      try {
        await preloadAll();
      } catch (e) {
        console.error(e);
        $text.textContent = 'טעינה נכשלה. בדוק נתיבים (paths) בקונסול.';
      } finally {
        // After preload completes (even if audio failed), enable fullscreen button and remove overlay
        showFullscreenControlsIfNeeded();
        $overlay.style.display = 'none';
      }
    });

    // Optional: if you want fullscreen on first tile click (still user gesture):
    // document.querySelectorAll('.tile').forEach(a => {
    //   a.addEventListener('click', (e) => {
    //     // don't block navigation; just request fullscreen and let browser navigate
    //     requestFullscreen();
    //   }, { passive: true });
    // });
  </script>
</body>
</html>
