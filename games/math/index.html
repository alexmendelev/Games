<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>תרגילים נופלים - games_v3</title>
  <link rel="preload" href="../shared/assets/ui/background.png" as="image">
  <link rel="preload" href="../shared/assets/ui/rock.png" as="image">
  <link rel="preload" href="../shared/assets/ui/tablet.png" as="image">
  <link rel="preload" href="../shared/assets/ui/pause.png" as="image">
  <link rel="preload" href="../shared/assets/ui/resume.png" as="image">
  <link rel="preload" href="../shared/assets/ui/unmute.png" as="image">
  <link rel="preload" href="../shared/assets/ui/mute.png" as="image">
  <link rel="preload" href="../shared/assets/ui/exit.png" as="image">
  <link rel="preload" href="../shared/assets/ui/coin.svg" as="image">
  <link rel="preload" href="../shared/assets/ui/heart.svg" as="image">
  <link rel="preload" href="../shared/assets/ui/star.svg" as="image">
  <link rel="preload" href="../shared/assets/mascot/kittydance.png" as="image">
  <link rel="preload" href="../shared/assets/mascot/kittysad.png" as="image">
  <link rel="preload" href="../shared/assets/audio/splash.mp3" as="audio" type="audio/mpeg">
  <link rel="preload" href="../shared/assets/audio/coin_drop.mp3" as="audio" type="audio/mpeg">
  <link rel="stylesheet" href="../shared/styles/tokens.css?v=20260331font1">
  <link rel="stylesheet" href="../shared/styles/falling-game.css?v=20260331layout23">
  <link rel="stylesheet" href="../shared/styles/game-meta.css?v=20260331meta43">
</head>
<body>
  <div class="wrap">
    <div id="game" class="game">
      <div id="mascot" class="mascot" aria-hidden="true"></div>
      <div id="tile" class="tile">1+3</div>

      <div id="overlay" class="overlay">
        <div class="card">
          <h2>בחרו רמה</h2>
          <div class="diffs" id="diffs">
            <button class="diffbtn" type="button" data-diff="easy">קל</button>
            <button class="diffbtn" type="button" data-diff="medium">בינוני</button>
            <button class="diffbtn" type="button" data-diff="hard">קשה</button>
            <button class="diffbtn" type="button" data-diff="super">סופר</button>
          </div>
        </div>
      </div>
    </div>

    <div class="side">
      <div class="panel">
        <div class="row topStats">
          <div class="block scoreBlock">
            <span class="hudLabel hudLabel--score" aria-hidden="true"></span>
            <div class="stat scoreOnly pointsPanel"><b id="score">0</b></div>
          </div>
          <div class="vitalStats">
            <div class="block coinsBlock">
              <div class="statusCardHead">
                <img id="coinIcon" src="../shared/assets/ui/coin.svg" alt="" class="icon">
                <span class="hudLabel hudLabel--coins" aria-hidden="true"></span>
              </div>
              <div class="stat"><b id="coins">0</b></div>
            </div>
            <div class="block livesBlock">
              <div class="statusCardHead">
                <img id="livesIcon" src="../shared/assets/ui/heart.svg" alt="" class="icon">
                <span class="hudLabel hudLabel--lives" aria-hidden="true"></span>
              </div>
              <div class="stat"><b id="lives">10</b></div>
            </div>
          </div>
          <div class="streakPanel">
            <span class="hudLabel hudLabel--streak" aria-hidden="true"></span>
            <div id="streakMeter" class="streakMeter" aria-hidden="true">
              <div id="streakFill" class="streakFill"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel answersPanel">
        <div class="answers" id="answers">
          <button class="ans" type="button" data-idx="0">0</button>
          <button class="ans" type="button" data-idx="1">0</button>
          <button class="ans" type="button" data-idx="2">0</button>
          <button class="ans" type="button" data-idx="3">0</button>
        </div>
      </div>

      <div class="panel bottom">
        <div class="row">
          <div class="actions">
            <button id="pauseBtn" class="ctrl iconBtn" type="button" aria-label="השהיה"></button>
            <button id="muteBtn" class="ctrl iconBtn" type="button" aria-label="השתקת קול"></button>
            <button id="exitBtn" class="ctrl iconBtn" type="button" aria-label="יציאה"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/scripts/utils.js?v=20260314p"></script>
  <script src="../shared/scripts/audio.js?v=20260320audio3"></script>
  <script src="../shared/scripts/fx.js?v=20260314p"></script>
  <script src="../shared/scripts/game-shell.js?v=20260324runner2"></script>
  <script src="../shared/scripts/game-meta.js?v=20260331meta25"></script>
  <script src="config.js?v=20260322mascot1"></script>
  <script src="game.js?v=20260323runner1"></script>
</body>
</html>
