<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>משחקים לילדים</title>
  <style>
    :root { --bg:#06101f; --card:rgba(10,18,40,0.70); --border:rgba(255,255,255,0.16); --text:#fff; --muted:rgba(255,255,255,0.82); }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height:1.35;
    }

    .wrap{
      min-height: 100dvh;
      padding: 18px;
      padding-top: calc(18px + env(safe-area-inset-top));
      padding-right: calc(18px + env(safe-area-inset-right));
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      padding-left: calc(18px + env(safe-area-inset-left));
      display:flex;
      justify-content:center;
    }

    .container{ width:min(980px, 100%); }

    .header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .title{
      font-size: 34px;
      font-weight: 900;
      margin:0;
    }
    .sub{
      margin:6px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .search{
      width: min(340px, 70vw);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      outline: none;
      font-size: 16px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
    }
    @media (max-width: 760px){
      .header{ align-items:flex-start; flex-direction:column; }
      .actions{ width:100%; justify-content:flex-start; }
      .search{ width:100%; }
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      display:flex;
      gap: 14px;
      align-items: stretch;
    }

    .thumb{
      width: 140px;
      height: 96px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #1a2a46 center/cover no-repeat;
      flex: 0 0 auto;
      overflow:hidden;
      position:relative;
    }
    .thumb::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.28));
      pointer-events:none;
    }

    .info{ flex:1; min-width:0; }
    .name{
      margin:0;
      font-size: 22px;
      font-weight: 900;
    }
    .desc{
      margin:6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .meta{
      margin:10px 0 0;
      color: rgba(255,255,255,0.70);
      font-size: 13px;
    }

    .btnrow{
      display:flex;
      gap:10px;
      margin-top: 12px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:800;
      font-size: 16px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width: 120px;
    }
    .btn.primary{ background: rgba(90,120,255,0.25); border-color: rgba(90,120,255,0.45); }
    .btn:active{ transform: translateY(1px); }

    .tag{
      display:inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      margin-inline-start: 8px;
      color: rgba(255,255,255,0.88);
      vertical-align: middle;
      white-space:nowrap;
    }

    .footer{
      margin-top: 14px;
      color: rgba(255,255,255,0.70);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="container">
      <div class="header">
        <div>
          <h1 class="title">משחקים לילדים</h1>
          <p class="sub">בחרו משחק</p>
        </div>

        <div class="actions">
          <input id="q" class="search" type="search" placeholder="חיפוש…" autocomplete="off" />
        </div>
      </div>

      <div id="grid" class="grid">
        <!-- GAME 1 -->
        <div class="card" data-name="תרגילים נופלים math falling arithmetic" data-tags="מתמטיקה מהירות">
          <div class="thumb" style="background-image:url('assets/bg.png');"></div>
          <div class="info">
            <h2 class="name">
              תרגילים נופלים
              <span class="tag">מתמטיקה</span>
              <span class="tag">מהירות</span>
            </h2>
            <p class="desc">בחרו תשובה נכונה לפני שהטבלית נופלת לבריכה.</p>
            <div class="meta">קלט: עכבר/מגע. מקלדת: 1–4. טלפון: אופקי בלבד.</div>

            <div class="btnrow">
              <!-- поменяй путь на реальный файл игры -->
              <a class="btn primary" href="falling_math_heb.html" data-play>שחק</a>
            </div>
          </div>
        </div>

        <!-- TEMPLATE: копируй блок card для новых игр -->
        <div class="card" data-name="משחק נוסף coming soon" data-tags="בקרוב">
          <div class="thumb" style="background-image:linear-gradient(135deg,#243b6b,#1a2a46);"></div>
          <div class="info">
            <h2 class="name">
              משחק נוסף
              <span class="tag">בקרוב</span>
            </h2>
            <p class="desc">כאן תוסיפו משחקים חדשים: זיכרון, חשבון, אותיות וכו׳.</p>
            <div class="meta">קובץ: your-game.html</div>

            <div class="btnrow">
              <button class="btn" disabled>בקרוב</button>
            </div>
          </div>
        </div>
      </div>

      <div class="footer" id="lastPlayed"></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const q = document.getElementById("q");
  const grid = document.getElementById("grid");
  const cards = Array.from(grid.querySelectorAll(".card"));
  const lastPlayed = document.getElementById("lastPlayed");

  // Search
  function applyFilter() {
    const term = (q.value || "").trim().toLowerCase();
    for (const c of cards) {
      const hay = (c.dataset.name + " " + (c.dataset.tags || "")).toLowerCase();
      c.style.display = hay.includes(term) ? "" : "none";
    }
  }
  q.addEventListener("input", applyFilter);

  // Remember last played
  const KEY = "kids_games_last_played";
  function renderLastPlayed() {
    const v = localStorage.getItem(KEY);
    lastPlayed.textContent = v ? (`משחק אחרון: ${v}`) : "";
  }
  renderLastPlayed();

  grid.addEventListener("click", (e) => {
    const a = e.target.closest("a[data-play]");
    if (!a) return;
    const card = a.closest(".card");
    const name = card?.querySelector(".name")?.childNodes?.[0]?.textContent?.trim() || "משחק";
    try { localStorage.setItem(KEY, name); } catch (_) {}
  });
})();
</script>
</body>
</html>
