<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Emoji list</title>
  <style>
    body { margin:0; font-family: Arial, "Noto Sans Hebrew", system-ui, sans-serif; background:#0b1220; color:#fff; }
    header { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.12); position:sticky; top:0; background:#0b1220; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:10px; padding:12px; }
    .card { display:flex; gap:10px; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); align-items:center; }
    .emoji { width:44px; height:44px; flex:0 0 44px; }
    .txt { display:flex; flex-direction:column; gap:2px; }
    .he { direction:rtl; text-align:right; font-size:16px; }
    .en { direction:ltr; text-align:left; font-size:13px; opacity:0.9; }
    .id { direction:ltr; text-align:left; font-size:11px; opacity:0.65; }
    .bad { opacity:0.5; filter: grayscale(1); }
  </style>
</head>
<body>
  <header>Emoji list</header>
  <div id="grid" class="grid"></div>

  <script>
    const TSV_URL = 'assets/emoji-easy-oneword-he.tsv';
    const IMG_DIR = 'assets/emojis'; // expects <CODE>.png inside

    function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    async function loadTsv() {
      const txt = await (await fetch(TSV_URL)).text();
      return txt.split(/\r?\n/)
        .map(l => l.trim())
        .filter(Boolean)
        .map(line => {
          const [id, en, he] = line.split('\t');
          const code = (id || '').trim().toUpperCase();
          return {
            id: code,
            en: (en || '').trim(),
            he: (he || '').trim(),
            src: `${IMG_DIR}/${code}.png`
          };
        })
        .filter(x => x.id && x.en && x.he);
    }

    function render(list) {
      const grid = document.getElementById('grid');
      grid.innerHTML = list.map(e => `
        <div class="card">
          <img class="emoji" src="${esc(e.src)}" alt="${esc(e.en)}"
               onerror="this.classList.add('bad'); this.title='Missing file: ${esc(e.src)}';" />
          <div class="txt">
            <div class="he">${esc(e.he)}</div>
            <div class="en">${esc(e.en)}</div>
            <div class="id">${esc(e.id)}</div>
          </div>
        </div>
      `).join('');
    }

    (async () => {
      const list = await loadTsv();
      render(list);
    })();
  </script>
</body>
</html>
