<!doctype html>
<html lang="he" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>מילים נופלות</title>

  <link rel="preload" href="assets/splash.mp3" as="audio" type="audio/mpeg">
  <link rel="preload" href="assets/coin_drop.mp3" as="audio" type="audio/mpeg">

  <style>
    :root {
      --text:#ffffff;
      --muted:rgba(255,255,255,0.85);
      --ui: 1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #06101f;
      color: var(--text);
      font-family: Arial, "Noto Sans Hebrew", "Rubik", "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      line-height: 1.35;
      overflow: hidden;
    }

    .wrap {
      height: 100dvh;
      padding: 14px;
      display: flex;
      gap: 14px;
      direction: ltr;
    }

    .game {
      flex: 1;
      min-width: 280px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      background: #1a2a46 url("assets/bg.png") center/cover no-repeat;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .mascot {
      position: absolute;
      left: 10%;
      bottom: 14px;
      width: min(calc(260px * var(--ui)), 34vw);
      height: auto;
      pointer-events: none;
      z-index: 110;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,0.40));
    }

    .tile {
      position: absolute;
      top: 0; left: 0;
      width: calc(240px * var(--ui));
      height: calc(78px * var(--ui));
      background: url("assets/tablet.png") center/contain no-repeat;
      background-size:100% 100%;
      display: grid;
      place-items: center;
      font-size: calc(36px * var(--ui));
      font-weight: 900;
      color: #1b1b1b;
      text-shadow: 0 2px 0 rgba(255,255,255,0.25), 0 10px 22px rgba(0,0,0,0.20);
      user-select: none;
      transform: translate(20px, -90px);
      pointer-events: none;
      z-index: 10;

      direction: rtl;
      text-align: center;
      padding: 0 calc(10px * var(--ui));
    }

    .side {
      width: min(calc(340px * var(--ui)), 45vw);
      display: flex;
      flex-direction: column;
      gap: 12px;
      direction: rtl;
    }

    .panel {
      background: rgba(10,18,40,0.55);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: calc(12px * var(--ui));
      backdrop-filter: blur(6px);
    }
    .panel.bottom { margin-top: auto; }
    .answersPanel { margin-top: 20%; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .panel.bottom .row{ justify-content:center; flex-wrap:nowrap; }
    .panel.bottom .actions{ display:flex; gap:8px; flex:0 0 auto; }
.panel.bottom .ctrl{ height: calc(64px * var(--ui)); padding: 0 calc(10px * var(--ui)); font-size: calc(16px * var(--ui)); }

    .stat { color: var(--muted); font-size: calc(16px * var(--ui)); }
    .stat b {
      color: var(--text);
      font-size: calc(22px * var(--ui));
      margin-inline-start: 6px;
      font-weight: 900;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      padding: calc(12px * var(--ui)) calc(14px * var(--ui));
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: calc(18px * var(--ui));
    }
    .btn:hover { background: rgba(255,255,255,0.14); }
    .btn.primary { background: rgba(90,120,255,0.25); border-color: rgba(90,120,255,0.45); }

    .answers { display: grid; grid-template-columns: 1fr 1fr; gap: calc(12px * var(--ui)); }

.ans {
  height: calc(184px * var(--ui));
  border: 2px solid rgba(255,255,255,0.78);
  border-radius: calc(22px * var(--ui));
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,0.96), rgba(255,255,255,0.86) 48%, rgba(237,244,255,0.82) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.85),
    0 10px 22px rgba(0,0,0,0.22);
  cursor: pointer;
  padding: calc(8px * var(--ui));
  display: grid;
  place-items: center;
  overflow: hidden;
  transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
}

.ans img {
  width: 100%;
  height: 100%;
  max-width: calc(152px * var(--ui));
  max-height: calc(152px * var(--ui));
  object-fit: contain;
  object-position: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s ease, transform .12s ease;

  /* keep dark outlines readable over brighter card */
  filter: drop-shadow(0 8px 14px rgba(0,0,0,0.25));
}
.ans img.is-ready { opacity: 1; }
.ans img:not([src]),
.ans img[src=""] { opacity: 0; }

.ans:active { transform: scale(0.985); }
.ans:hover {
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.9),
    0 12px 26px rgba(0,0,0,0.24);
}
.ans:active img { transform: scale(0.985); }
.ans:hover  img { transform: scale(1.03); }

    /* top stats */
    .topStats{ justify-content: space-between; align-items:center; width:100%; gap: calc(8px * var(--ui)); flex-wrap: nowrap; }
    .topStats .block{ display:flex; flex-direction:column; align-items:center; gap:4px; }
    .topStats img.icon{ width: calc(92px * var(--ui)); height: auto; display:block; }
    .topStats .stat b{ margin-inline-start:4px; }
    .scoreBlock{ flex:0 0 auto; align-items:center !important; }
    .pointsPanel{
      min-height: calc(60px * var(--ui));
      width: calc(128px * var(--ui));
      min-width: calc(128px * var(--ui));
      max-width: calc(128px * var(--ui));
      padding: 0 calc(11px * var(--ui));
      display:flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: calc(14px * var(--ui));
      background: rgba(255,255,255,.08);
    }
    .pointsPanel b{
      font-size: calc(34px * var(--ui)) !important;
      line-height: 1;
      letter-spacing: .5px;
      font-variant-numeric: tabular-nums;
    }
    .vitalStats{ display:flex; gap: calc(8px * var(--ui)); flex-wrap:nowrap; }
    .vitalStats .block{ min-width: calc(58px * var(--ui)); }

    .ctrl{
      height: calc(54px * var(--ui));
      padding: 0 calc(16px * var(--ui));
      font-size: calc(20px * var(--ui));
      font-weight: 800;
      border-radius: calc(14px * var(--ui));
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .ctrl:active{ transform: translateY(1px); }
    .ctrl.iconBtn{
      width: calc(141px * var(--ui));
      min-width: calc(141px * var(--ui));
      padding: 0;
      background-color: rgba(255,255,255,.10);
      background-position: center;
      background-repeat: no-repeat;
      background-size: 70% 70%;
    }
    #pauseBtn{ background-image: url("assets/pause.png"); }
    #pauseBtn.paused{ background-image: url("assets/resume.png"); }
    #exitBtn{ background-image: url("assets/exit.png"); }

    .overlay {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      z-index: 100;
    }
    .diffs{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .diffbtn{
      appearance:none;
      border: 2px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.12);
      color: var(--text);
      border-radius: 18px;
      cursor:pointer;
      font-weight: 900;
      font-size: clamp(28px, 4.2vw, 64px);
      padding: clamp(18px, 3.2vw, 44px) clamp(14px, 2.8vw, 36px);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
    }
    .diffbtn:active{ transform: scale(0.98); }
    .diffbtn:hover{ background: rgba(255,255,255,.14); }

    .fx {
      position: absolute;
      pointer-events: none;
      background-repeat: no-repeat;
      image-rendering: auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25));
      z-index: 8;
    }
    .coinFly{
      position: fixed;
      left: 0;
      top: 0;
      width: clamp(34px, 5.2vw, 56px);
      height: auto;
      pointer-events: none;
      z-index: 320;
      will-change: transform, opacity;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }

    .panel { direction: rtl; text-align: right; }

    @media (max-width: 820px){
      .panel.bottom .actions{ gap:6px; }
      .panel.bottom .ctrl{ height: calc(56px * var(--ui)); padding: 0 calc(8px * var(--ui)); font-size: calc(14px * var(--ui)); }
      .wrap { flex-direction: column; }
      .game{ flex: 0 0 52dvh; min-height: 52dvh; }
      .side { width: 100%; max-width: 100%; flex:1 1 auto; min-height:0; overflow:hidden; }
      .answersPanel { margin-top: 1%; }
      .panel.bottom { margin-top: 10px; }
      .side { gap: 8px; }
      .mascot { width: min(calc(220px * var(--ui)), 32vw); left: 6%; }
    }
    @media (max-height: 880px){
      .answersPanel { margin-top: 0; }
      .panel.bottom { margin-top: 6px; }
      .side { gap: 6px; }
      .answers { gap: calc(8px * var(--ui)); }
      .ans { height: calc(132px * var(--ui)); }
      .ans img { width: calc(112px * var(--ui)); height: calc(112px * var(--ui)); }
    }
    @media (max-width: 820px) and (orientation: portrait){
      .game{ flex: 1 1 auto; min-height: 36dvh; }
      .side { flex: 0 0 auto; min-height: auto; overflow: visible; gap: 6px; }
      .panel { padding: calc(9px * var(--ui)); }
      .answersPanel { margin-top: 0; }
      .answers { gap: calc(7px * var(--ui)); }
      .ans { height: calc(116px * var(--ui)); }
      .ans img { width: calc(94px * var(--ui)); height: calc(94px * var(--ui)); }
      .topStats img.icon{ width: calc(74px * var(--ui)); }
      .panel.bottom { margin-top: 0; }
    }
    @media (max-width: 420px){
      .mascot { width: min(calc(200px * var(--ui)), 30vw); }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div id="game" class="game">
    <img id="mascot" class="mascot" src="assets/cat_idle.png" alt="" />
    <div id="tile" class="tile">טוען...</div>

    <div id="overlay" class="overlay">
      <div class="menu">
        <div class="diffs" id="diffs">
          <button class="diffbtn" data-diff="easy">קל</button>
          <button class="diffbtn" data-diff="medium">בינוני</button>
          <button class="diffbtn" data-diff="hard">קשה</button>
          <button class="diffbtn" data-diff="super">סופר</button>
        </div>
      </div>
    </div>
  </div>

  <div class="side">
    <div class="panel">
      <div class="row topStats">
        <div class="block scoreBlock">
          <div class="stat scoreOnly pointsPanel"><b id="score">0</b></div>
        </div>
        <div class="vitalStats">
          <div class="block">
            <img id="coinIcon" src="../fallingNumbers/assets/kittendollar.png" alt="" class="icon">
            <div class="stat"><b id="coins">0</b></div>
          </div>
          <div class="block">
            <img src="../fallingNumbers/assets/lives.png" alt="" class="icon">
            <div class="stat"><b id="lives">10</b></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel answersPanel">
      <div class="answers" id="answers">
        <button class="ans" data-idx="0"><img alt=""></button>
        <button class="ans" data-idx="1"><img alt=""></button>
        <button class="ans" data-idx="2"><img alt=""></button>
        <button class="ans" data-idx="3"><img alt=""></button>
      </div>
    </div>

    <div class="panel bottom">
      <div class="row">
        <div class="actions">
          <button id="pauseBtn" class="ctrl iconBtn" type="button" aria-label="השהיה"></button>
          <button id="exitBtn" class="ctrl iconBtn" type="button" aria-label="יציאה"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const WATER_Y_RATIO = 0.72;

  const ASSETS = {
    splash: { url: "assets/splash_sheet.png", sheetW: 1024, sheetH: 1024, cols: 4, rows: 4, frames: 16, fps: 30, scale: 0.75 },
    burst:  { url: "assets/burst_sheet.png",  sheetW: 1024, sheetH: 1024, cols: 4, rows: 4, frames: 16, fps: 30, scale: 0.65 },
    mascotIdle: "assets/cat_idle.png",
    mascotHappy: "assets/cat_happy.png?v=2",
    mascotShame: "assets/cat_shame.png",
    emojiTsv: "assets/emoji-easy-oneword-he.tsv",
    emojiDir: "assets/emojis"
  };
  const FALLBACK_EMOJIS = [
    { id: "1F408", he: "חתול" },
    { id: "1F415", he: "כלב" },
    { id: "1F407", he: "ארנב" },
    { id: "1F40D", he: "נחש" },
    { id: "1F42C", he: "דולפין" },
    { id: "1F427", he: "פינגווין" },
    { id: "1F414", he: "תרנגול" },
    { id: "2708",  he: "מטוס" }
  ];

  const CONFIG = {
    livesStart: 10,
    scoreWrong: -5,
    scoreMiss: -10,

    baseSpeed: 120,
    speedIncPerLevel: 15,
    pointsPerLevel: 120,

    tileWidth: 240,
    tileHeight: 78,
    tileMargin: 10,

    correctMin: 10,
    correctMax: 20,
    correctTimeCapSec: 2.0,

    sfxGain: 0.10
  };

  const DIFFICULTIES = {
    easy:   { label: "קל",     speedMul: 0.50 },
    medium: { label: "בינוני", speedMul: 1.00 },
    hard:   { label: "קשה",    speedMul: 1.20 },
    super:  { label: "סופר",   speedMul: 1.50 }
  };

  const gameEl   = document.getElementById("game");
  const tileEl   = document.getElementById("tile");
  const overlay  = document.getElementById("overlay");
  const pauseBtn = document.getElementById("pauseBtn");
  const exitBtn = document.getElementById("exitBtn");

  const scoreEl  = document.getElementById("score");
  const coinEl  = document.getElementById("coins");
  const coinIconEl = document.getElementById("coinIcon");
  const livesEl  = document.getElementById("lives");

  const answersEl = document.getElementById("answers");
  const ansBtns = Array.from(answersEl.querySelectorAll(".ans"));
  const ansImgs = ansBtns.map(b => b.querySelector("img"));

  const diffsEl = document.getElementById("diffs");
  const diffBtns = Array.from(diffsEl.querySelectorAll(".diffbtn"));
  const mascotEl = document.getElementById("mascot");

  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
  const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const shuffleInPlace = (arr) => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  };

  // ===== Emoji list =====
  let EMOJIS = []; // {id,en,he,src}
  let correctDeck = [];
  let deckPos = 0;
  let recentCorrectIds = [];
  const RECENT_CORRECT_LIMIT = 8;

async function loadEmojiTsv() {
  const r = await fetch(ASSETS.emojiTsv, { cache: "no-store" });
  if (!r.ok) throw new Error("Failed to load TSV: " + r.status);
  const txt = await r.text();

  return txt.split(/\r?\n/).map(l => l.trim()).filter(Boolean).map(line => {
	const [id, en, he] = line.split("\t");
	const code = (id || "").trim().toUpperCase();
	return {
	  id: code,
	  en: (en || "").trim(),
	  he: (he || "").trim(),
	  src: `${ASSETS.emojiDir}/${code}.png`
	};
  }).filter(x => x.id && x.he);
}

  function fallbackEmojiList() {
    return FALLBACK_EMOJIS.map(x => ({
      id: x.id,
      en: "",
      he: x.he,
      src: `${ASSETS.emojiDir}/${x.id}.png`
    }));
  }

  function refillCorrectDeck() {
    correctDeck = EMOJIS.slice();
    shuffleInPlace(correctDeck);
    deckPos = 0;
  }

  function nextCorrectEmoji() {
    if (!EMOJIS.length) return null;
    if (!correctDeck.length || deckPos >= correctDeck.length) refillCorrectDeck();

    // Prefer an item not used very recently.
    let candidate = null;
    let tries = 0;
    while (tries < correctDeck.length) {
      if (deckPos >= correctDeck.length) refillCorrectDeck();
      candidate = correctDeck[deckPos++];
      if (!recentCorrectIds.includes(candidate.id)) break;
      tries += 1;
    }

    if (!candidate) candidate = choice(EMOJIS);
    recentCorrectIds.push(candidate.id);
    if (recentCorrectIds.length > RECENT_CORRECT_LIMIT) recentCorrectIds.shift();
    return candidate;
  }

  // ===== Responsive UI scale =====
  function computeUi() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const s = Math.min(vw / 900, vh / 650);
    const portrait = vh > vw;
    return clamp(s * (portrait ? 0.92 : 1.0), 0.58, 1.0);
  }

  function applyUi() {
    const ui = computeUi();
    document.documentElement.style.setProperty("--ui", ui.toFixed(3));
    CONFIG.tileWidth  = Math.round(240 * ui);
    CONFIG.tileHeight = Math.round(78  * ui);
    CONFIG.tileMargin = Math.round(10  * ui);
  }

  window.addEventListener("resize", applyUi);
  window.addEventListener("orientationchange", applyUi);
  applyUi();

  // ===== Image readiness helpers =====
  function waitImgReady(img) {
    if (img.decode) return img.decode().catch(() => {});
    return new Promise((res, rej) => {
      if (img.complete && img.naturalWidth) return res();
      img.onload = () => res();
      img.onerror = rej;
    });
  }

  async function preload(url) {
    const img = new Image();
    img.src = url;
    await waitImgReady(img);
    return img;
  }

  (async () => {
    try {
      await Promise.all([
        preload(ASSETS.mascotIdle),
        preload(ASSETS.mascotHappy),
        preload(ASSETS.mascotShame),
        preload(ASSETS.splash.url),
        preload(ASSETS.burst.url),
      ]);
    } catch (_) {}
  })();

  let selectedDiff = "medium";

  let running = false;
  let paused = false;
  let rafId = null;
  let lastTs = 0;

  let score = 0;
  let coins = 0;
  let lives = CONFIG.livesStart;
  let consecutiveCorrect = 0;

  let task = null;
  let lockInputUntil = 0;

  function currentDiffCfg() { return DIFFICULTIES[selectedDiff] || DIFFICULTIES.medium; }

  function setDifficulty(d) {
    if (!DIFFICULTIES[d]) return;
    selectedDiff = d;
  }

  function getLevel() { return Math.max(1, Math.floor(score / CONFIG.pointsPerLevel) + 1); }

  function gameRect() { return gameEl.getBoundingClientRect(); }
  function waterY(r) { return r.height * WATER_Y_RATIO; }

  function getSpeed() {
    const base = CONFIG.baseSpeed + (getLevel() - 1) * CONFIG.speedIncPerLevel;

    // Normalize by game area height so phone doesn't feel faster
    const r = gameRect();
    const h = (r && r.height) ? r.height : 650;
    const heightMul = Math.max(0.72, Math.min(1.15, h / 650));

    return base * currentDiffCfg().speedMul * heightMul;
  }

  function setHUD() {
    scoreEl.textContent = String(score);
    coinEl.textContent = String(coins);
    livesEl.textContent = String(lives);
  }

  function pointsForCorrect(reactionSec) {
    const t = clamp(reactionSec, 0, CONFIG.correctTimeCapSec);
    const frac = 1 - (t / CONFIG.correctTimeCapSec);
    return Math.round(CONFIG.correctMin + (CONFIG.correctMax - CONFIG.correctMin) * frac);
  }

  // ===== SOUND =====
  let audioCtx = null;
  let masterGain = null;

  const splashPool = Array.from({ length: 6 }, () => {
    const a = new Audio("assets/splash.mp3");
    a.preload = "auto";
    a.volume = 0.9;
    a.load();
    return a;
  });
  const coinDropPool = Array.from({ length: 4 }, () => {
    const a = new Audio("assets/coin_drop.mp3");
    a.preload = "auto";
    a.volume = 0.9;
    a.load();
    return a;
  });
  let splashI = 0;
  let coinDropI = 0;
  let audioUnlocked = false;

  function ensureAudio() {
    try {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = CONFIG.sfxGain;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    } catch (_) {}

    if (audioUnlocked) return;
    audioUnlocked = true;

    const a = splashPool[0];
    try {
      a.muted = true;
      const p = a.play();
      if (p && p.then) {
        p.then(() => {
          a.pause();
          a.currentTime = 0;
          a.muted = false;
        }).catch(() => { a.muted = false; });
      } else {
        a.pause(); a.currentTime = 0; a.muted = false;
      }
    } catch (_) { a.muted = false; }
  }

  function playSplash() {
    const a = splashPool[splashI++ % splashPool.length];
    try { a.currentTime = 0; } catch (_) {}
    a.play().catch(() => { audioUnlocked = false; ensureAudio(); });
  }
  function playCoinDrop() {
    const a = coinDropPool[coinDropI++ % coinDropPool.length];
    try { a.currentTime = 0; } catch (_) {}
    a.play().catch(() => {});
  }

  function beep({freq=440, dur=0.12, type="sine", gain=1.0, when=0, rampTo=null}) {
    if (!audioCtx || !masterGain) return;
    const t0 = audioCtx.currentTime + when;
    const t1 = t0 + Math.max(0.01, dur);

    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (rampTo && rampTo > 0) osc.frequency.exponentialRampToValueAtTime(rampTo, t1);

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t1);

    osc.connect(g);
    g.connect(masterGain);

    osc.start(t0);
    osc.stop(t1 + 0.02);
  }

  const sfx = {
    correct() { ensureAudio(); beep({freq: 880, dur: 0.06, type: "triangle", gain: 1.0, rampTo: 1320}); beep({freq: 1320, dur: 0.08, type: "sine", gain: 0.8, when: 0.05}); },
    wrong()   { ensureAudio(); beep({freq: 240, dur: 0.10, type: "sine", gain: 0.9, rampTo: 180}); },
    splash()  { ensureAudio(); playSplash(); },
    coin()    { ensureAudio(); playCoinDrop(); },
    death()   { ensureAudio(); beep({freq: 420, rampTo: 110, dur: 0.75, type: "sawtooth", gain: 1.0}); }
  };

  window.addEventListener("pointerdown", ensureAudio, { once: true });

  // ===== FX (sprite sheet) =====
  function playFx(kind, x, y) {
    const cfg = ASSETS[kind];
    const frameW = cfg.sheetW / cfg.cols;
    const frameH = cfg.sheetH / cfg.rows;

    const el = document.createElement("div");
    el.className = "fx";
    el.style.left = `${x}px`;
    el.style.top  = `${y}px`;

    const scale = cfg.scale;
    el.style.width  = `${frameW * scale}px`;
    el.style.height = `${frameH * scale}px`;
    el.style.backgroundImage = `url("${cfg.url}")`;
    el.style.backgroundSize  = `${cfg.sheetW * scale}px ${cfg.sheetH * scale}px`;

    el.style.transform = (kind === "splash")
      ? "translate(-50%, -100%)"
      : "translate(-50%, -50%)";

    gameEl.appendChild(el);

    let frame = 0;
    const interval = Math.round(1000 / cfg.fps);

    const t = setInterval(() => {
      const col = frame % cfg.cols;
      const row = Math.floor(frame / cfg.cols);
      el.style.backgroundPosition = `${-(col * frameW * scale)}px ${-(row * frameH * scale)}px`;

      frame += 1;
      if (frame >= cfg.frames) {
        clearInterval(t);
        el.remove();
      }
    }, interval);
  }

  function popCoinIcon() {
    if (!coinIconEl || !coinIconEl.animate) return Promise.resolve();
    const anim = coinIconEl.animate(
      [
        { transform: "scale(1)", filter: "drop-shadow(0 0 0 rgba(255,215,64,0))" },
        { transform: "scale(1.34)", filter: "drop-shadow(0 0 10px rgba(255,215,64,.9))" },
        { transform: "scale(1)", filter: "drop-shadow(0 0 0 rgba(255,215,64,0))" }
      ],
      { duration: 330, easing: "cubic-bezier(.22,.61,.36,1)" }
    );
    return anim.finished.catch(() => {});
  }

  function animateCoinToHud(startXInGame, startYInGame) {
    if (!coinIconEl || !coinIconEl.getBoundingClientRect) return Promise.resolve();
    const gameR = gameEl.getBoundingClientRect();
    const coinR = coinIconEl.getBoundingClientRect();
    const startX = gameR.left + startXInGame;
    const startY = gameR.top + startYInGame;
    const endX = coinR.left + coinR.width / 2;
    const endY = coinR.top + coinR.height / 2;
    const ctrlX = (startX + endX) / 2;
    const ctrlY = Math.min(startY, endY) - 120;

    const flyEl = document.createElement("img");
    flyEl.className = "coinFly";
    flyEl.src = coinIconEl.currentSrc || coinIconEl.src;
    flyEl.alt = "";
    document.body.appendChild(flyEl);

    const frames = [
      { transform: `translate(${startX}px, ${startY}px) translate(-50%, -50%) scale(.35)`, opacity: 0.0, offset: 0 },
      { transform: `translate(${startX}px, ${startY - 8}px) translate(-50%, -50%) scale(.95)`, opacity: 1.0, offset: 0.14 },
      { transform: `translate(${ctrlX}px, ${ctrlY}px) translate(-50%, -50%) scale(1.05)`, opacity: 1.0, offset: 0.72 },
      { transform: `translate(${endX}px, ${endY}px) translate(-50%, -50%) scale(.62)`, opacity: 1.0, offset: 1 }
    ];
    const anim = flyEl.animate(frames, { duration: 2480, easing: "cubic-bezier(.17,.67,.27,1)" });
    return anim.finished.catch(() => {}).then(() => { flyEl.remove(); });
  }

  function awardCoinFromBurst(startXInGame, startYInGame) {
    animateCoinToHud(startXInGame, startYInGame)
      .then(() => { sfx.coin(); return popCoinIcon(); })
      .finally(() => {
        coins += 1;
        setHUD();
      });
  }

  // ===== Mascot =====
  let mascotPulseToken = 0;
  async function mascotHappyPulse() {
    const token = ++mascotPulseToken;
    mascotEl.src = ASSETS.mascotHappy;
    try { await waitImgReady(mascotEl); } catch {}
    setTimeout(() => { if (token === mascotPulseToken) mascotEl.src = ASSETS.mascotIdle; }, 350);
  }

  let mascotShameToken = 0;
  async function mascotShamePulse() {
    const token = ++mascotShameToken;
    mascotEl.src = ASSETS.mascotShame;
    try { await waitImgReady(mascotEl); } catch {}
    setTimeout(() => { if (token === mascotShameToken) mascotEl.src = ASSETS.mascotIdle; }, 700);
  }

  // ===== TASKS (word -> image) =====
  function generateTask() {
    // Pick correct emoji from a shuffled deck to reduce immediate repeats
    const correct = nextCorrectEmoji();

    // Pick 3 wrong distinct emojis
    const pool = EMOJIS.filter(e => e.id !== correct.id);
    shuffleInPlace(pool);
    const options = [correct, pool[0], pool[1], pool[2]];
    shuffleInPlace(options);

    const r = gameRect();
    const maxX = Math.max(CONFIG.tileMargin, r.width - CONFIG.tileWidth - CONFIG.tileMargin);
    const x = randInt(CONFIG.tileMargin, Math.floor(maxX));
    const y = -CONFIG.tileHeight;

    return {
      wordHe: correct.he,
      correctId: correct.id,
      options,
      x, y
    };
  }

	function warm(url) {
	  const im = new Image();
	  im.decoding = "async";
	  im.loading = "eager"; // harmless for JS-created Image
	  im.src = url;
	}

	function renderTask() {
	  tileEl.textContent = task.wordHe;
	  tileEl.style.transform = `translate(${task.x}px, ${task.y}px)`;

	  for (let i = 0; i < 4; i++) {
		const e = task.options[i];
		const img = ansImgs[i];

		ansBtns[i].dataset.value = e.id;

		img.classList.remove("is-ready");
		img.onload = () => { img.classList.add("is-ready"); };
		img.onerror = () => { img.classList.remove("is-ready"); };
		img.src = e.src;  // what user sees
		if (img.complete && img.naturalWidth > 0) img.classList.add("is-ready");
		warm(e.src);             // preloads into cache (safe to call even if already cached)
	  }
	}

  function spawnTask() {
    task = generateTask();
    task.spawnedAt = performance.now();
    renderTask();
  }

  // ===== GAME =====
  function startGame() {
    ensureAudio();
    running = true;
    paused = false;
    pauseBtn.classList.remove("paused");
    overlay.style.display = "none";
    lastTs = 0;
    spawnTask();
    setHUD();
    loop(performance.now());
  }

  function stopGame() {
    running = false;
    paused = false;
    pauseBtn.classList.remove("paused");
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    overlay.style.display = "grid";
  }

  function exitGame() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "exitGame" }, "*");
        return;
      }
    } catch (_) {}
    window.location.href = "../index.html";
  }

  function resetState() {
    score = 0;
    coins = 0;
    lives = CONFIG.livesStart;
    consecutiveCorrect = 0;
    paused = false;
    pauseBtn.classList.remove("paused");
    correctDeck = [];
    deckPos = 0;
    recentCorrectIds = [];
    setHUD();
    spawnTask();
  }

  function handleAnswer(idx) {
    if (!running || paused) return;
    const now = performance.now();
    if (now < lockInputUntil) return;

    const val = String(ansBtns[idx].dataset.value || "");
    const isCorrect = (val === task.correctId);

    if (isCorrect) {
      const currentTask = task;
      // Invalidate current tablet immediately so it cannot drown after a correct click.
      task = null;
      const rtSec = (now - currentTask.spawnedAt) / 1000;
      const burstX = currentTask.x + CONFIG.tileWidth / 2;
      const burstY = currentTask.y + CONFIG.tileHeight / 2;
      score += pointsForCorrect(rtSec);
      consecutiveCorrect += 1;
      if (consecutiveCorrect >= 4) {
        consecutiveCorrect = 0;
        awardCoinFromBurst(burstX, burstY);
      }

      playFx("burst", burstX, burstY);
      sfx.correct();
      mascotHappyPulse();

      setHUD();
      lockInputUntil = now + 120;
      if (running) spawnTask();
    } else {
      score += CONFIG.scoreWrong;
      consecutiveCorrect = 0;
      sfx.wrong();
      setHUD();
    }
  }

  function loop(ts) {
    if (!running || paused) return;
    if (!task) {
      rafId = requestAnimationFrame(loop);
      return;
    }

    if (!lastTs) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;

    task.y += getSpeed() * dt;
    tileEl.style.transform = `translate(${task.x}px, ${task.y}px)`;

    const r = gameRect();
    const wy = waterY(r);

    const DROWN_RATIO = 0.40;
    if (task && task.y + CONFIG.tileHeight * DROWN_RATIO >= wy) {
      const drownX = task.x + CONFIG.tileWidth/2;
      score += CONFIG.scoreMiss;
      lives -= 1;
      consecutiveCorrect = 0;
      setHUD();
      mascotShamePulse();

      if (lives <= 0) {
        playFx("splash", drownX, wy + 120);
        sfx.splash();
        sfx.death();
        stopGame();
        return;
      } else {
        spawnTask();
        playFx("splash", drownX, wy + 120);
        sfx.splash();
      }
    }

    rafId = requestAnimationFrame(loop);
  }

  async function ensureEmojiListLoaded() {
    if (EMOJIS.length) return true;
    ensureAudio();
    applyUi();
    tileEl.textContent = "טוען...";
    try {
      EMOJIS = await loadEmojiTsv();
    } catch (_) {
      EMOJIS = fallbackEmojiList();
    }
    if (EMOJIS.length < 8) {
      tileEl.textContent = "אין מספיק אימוג'ים";
      overlay.style.display = "grid";
      return false;
    }
    return true;
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    pauseBtn.classList.toggle("paused", paused);
    if (!paused) {
      lastTs = 0;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }
  }

  // ===== EVENTS =====
  diffsEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-diff]");
    if (!btn) return;
    setDifficulty(btn.dataset.diff);
    if (running) return;
    const ok = await ensureEmojiListLoaded();
    if (!ok) return;
    resetState();
    startGame();
  });

  pauseBtn.addEventListener("click", () => { ensureAudio(); togglePause(); });
  exitBtn.addEventListener("click", () => { ensureAudio(); exitGame(); });

  answersEl.addEventListener("click", (e) => {
    ensureAudio();
    const btn = e.target.closest("button.ans");
    if (!btn) return;
    handleAnswer(Number(btn.dataset.idx));
  });

  window.addEventListener("keydown", (e) => {
    if (!running) return;
    if (e.key >= "1" && e.key <= "4") { ensureAudio(); handleAnswer(Number(e.key) - 1); }
  });

  setDifficulty("medium");
  setHUD();
})();
</script>
